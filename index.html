<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Madness Circuit - Arcade Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@400;700;900&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background-color: #000; user-select: none; color: #fff; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Transparent Cinematic HUD Overlay */
        #menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 5vh 0; box-sizing: border-box; transition: opacity 0.5s ease;
        }
        
        .title-container { text-align: center; margin-top: 2vh; }
        .main-title { 
            font-family: 'Bungee', cursive; font-size: 7vw; margin: 0; color: #fff; 
            -webkit-text-stroke: 2px #ff0055; text-shadow: 0 0 30px #ff0055, 6px 6px 0px #00d2ff; line-height: 1;
        }
        .sub-title { font-size: 1.5vw; font-weight: 900; letter-spacing: 12px; color: #00d2ff; text-transform: uppercase; margin-top: 10px; text-shadow: 0 0 10px #00d2ff;}

        .garage-panel {
            background: rgba(10, 10, 15, 0.85); border: 2px solid #00d2ff; border-top: 6px solid #ff0055;
            border-radius: 12px; padding: 30px 40px; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(10px); width: 85%; max-width: 900px;
        }

        .input-row { display: flex; width: 100%; justify-content: center; margin-bottom: 25px; gap: 20px;}
        
        .name-input { 
            background: rgba(0,0,0,0.6); border: 1px solid #00d2ff; color: #fff; border-radius: 8px;
            padding: 15px 25px; font-size: 1.5em; font-family: 'Orbitron', sans-serif; font-weight: 700;
            text-align: center; outline: none; flex-grow: 1; max-width: 400px; text-transform: uppercase; letter-spacing: 2px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .name-input:focus { border-color: #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4), inset 0 0 10px rgba(0,0,0,0.8); }

        .color-grid { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        
        .color-swatch {
            width: 60px; height: 60px; border-radius: 50%; cursor: pointer; border: 3px solid transparent;
            transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.6); position: relative;
        }
        .color-swatch:hover { transform: scale(1.1); border-color: #fff; }
        .color-swatch.active { border-color: #fff; box-shadow: 0 0 20px #fff; transform: scale(1.15); }
        
        .start-btn { 
            background: linear-gradient(90deg, #ff0055, #cc0044); color: #fff; border: none; border-radius: 8px; 
            padding: 20px 80px; font-weight: 900; cursor: pointer; font-size: 2em; text-transform: uppercase; 
            letter-spacing: 4px; font-family: 'Bungee', cursive; box-shadow: 0 10px 30px rgba(255, 0, 85, 0.5);
            transition: 0.2s; animation: pulse 2s infinite;
        }
        .start-btn:hover { background: #fff; color: #ff0055; box-shadow: 0 10px 40px #fff; animation: none; transform: translateY(-3px); }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 0, 85, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 10px 50px rgba(255, 0, 85, 0.8); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 0, 85, 0.5); }
        }

        #countdown-box { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 18em; font-weight: 900; color: #fff; z-index: 50; pointer-events: none; text-shadow: 0 0 40px #00d2ff, 10px 10px 0px #ff0055; display: none; font-family: 'Bungee', cursive; }
        
        #leaderboard { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(5, 5, 10, 0.8); color: #fff; padding: 15px 25px; border-radius: 8px; border: 2px solid #00d2ff; backdrop-filter: blur(5px); display: none; }
        #place-display { font-size: 3.5em; font-weight: 900; color: #ff0055; text-align: center; margin-top: -5px; font-family: 'Bungee', cursive; }
        
        #dashboard { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(5, 5, 10, 0.8); color: #fff; padding: 20px 30px; border-radius: 8px; border: 2px solid #ff0055; font-family: 'Orbitron', sans-serif; pointer-events: none; backdrop-filter: blur(5px); display: none; }
        .stat { font-size: 2em; margin: 0; font-weight: 700; letter-spacing: 2px; color: #00d2ff; }
        .stat span { color: #fff; }

        /* Victory Overlay */
        #victory-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); z-index: 90; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #victory-card { background: rgba(10, 10, 15, 0.95); border: 2px solid #00d2ff; border-top: 8px solid #ff0055; padding: 40px 60px; border-radius: 12px; text-align: center; min-width: 650px; box-shadow: 0 0 80px rgba(0, 210, 255, 0.3); }
        #victory-card h2 { font-family: 'Bungee', cursive; font-size: 4.5em; margin: 0; color: #fff; text-shadow: 0 0 20px #ff0055; }
        #victory-place { font-size: 1.5em; margin: 10px 0 30px 0; color: #00d2ff; font-weight: 900; letter-spacing: 4px; }
        
        #final-leaderboard-container { width: 100%; margin-bottom: 30px; }
        .lb-row { display: flex; justify-content: space-between; padding: 15px 25px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 8px; font-size: 1.4em; font-weight: 700; align-items: center; }
        .lb-row.player-row { background: rgba(255, 0, 85, 0.2); border: 1px solid #ff0055; }
        .lb-rank { width: 40px; color: #00d2ff; font-family: 'Bungee', cursive; text-align: left; }
        .lb-name { flex-grow: 1; text-align: left; margin-left: 20px; letter-spacing: 2px; }

        .restart-btn { font-family: 'Bungee', cursive; background: #fff; color: #000; border: none; border-radius: 8px; padding: 20px 60px; font-weight: 900; cursor: pointer; font-size: 1.5em; transition: 0.2s; letter-spacing: 2px; }
        .restart-btn:hover { background: #00d2ff; color: #fff; box-shadow: 0 0 30px #00d2ff; }
        
        #confetti-canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 95; pointer-events: none; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="menu-overlay">
        <div class="title-container">
            <h1 class="main-title">MIDNIGHT MADNESS</h1>
            <div class="sub-title">Ultimate 3D Racing</div>
        </div>

        <div class="garage-panel">
            <div class="input-row">
                <input type="text" id="racer-name" class="name-input" placeholder="ENTER DRIVER ID..." maxlength="12" autocomplete="off">
            </div>
            
            <div style="color: #fff; font-weight: 700; letter-spacing: 3px; margin-bottom: 15px; font-size: 1.2em;">SELECT PAINT LIVERY</div>
            <div class="color-grid">
                <div class="color-swatch active" style="background: #e53e3e;" onclick="changePlayerColor(0xe53e3e, this)"></div>
                <div class="color-swatch" style="background: #ffaa00;" onclick="changePlayerColor(0xffaa00, this)"></div>
                <div class="color-swatch" style="background: #00d2ff;" onclick="changePlayerColor(0x00d2ff, this)"></div>
                <div class="color-swatch" style="background: #00ff66;" onclick="changePlayerColor(0x00ff66, this)"></div>
                <div class="color-swatch" style="background: #ff0055;" onclick="changePlayerColor(0xff0055, this)"></div>
                <div class="color-swatch" style="background: #ff5500;" onclick="changePlayerColor(0xff5500, this)"></div>
                <div class="color-swatch" style="background: #222222;" onclick="changePlayerColor(0x222222, this)"></div>
                <div class="color-swatch" style="background: #ffffff;" onclick="changePlayerColor(0xffffff, this)"></div>
            </div>

            <button class="start-btn" onclick="initiateRaceSequence()">START YOUR ENGINE</button>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="victory-screen">
        <div id="victory-card">
            <h2>CONGRATULATIONS!</h2>
            <div id="victory-place">LEADERBOARD</div>
            <div id="final-leaderboard-container"></div>
            <button class="restart-btn" onclick="window.location.reload()">PRESS HERE TO PLAY AGAIN</button>
        </div>
    </div>

    <div id="countdown-box">3</div>

    <div id="leaderboard">
        <div style="font-size: 1em; text-transform: uppercase; font-weight: 700; color: #00d2ff; letter-spacing: 2px;">Position</div>
        <div id="place-display">--</div>
    </div>

    <div id="dashboard">
        <div class="stat">SPEED: <span id="speed-out">0</span> MPH</div>
        <div class="stat">LAP: <span id="pos-out">1 / 1</span></div>
    </div>

    <script>
        // --- MASSIVELY EXTENDED TRACK ---
        const trackWaypoints = [
            new THREE.Vector3(0, 0, 0),         
            new THREE.Vector3(0, 0, -400),      
            new THREE.Vector3(200, 0, -600),    
            new THREE.Vector3(500, 0, -600),    
            new THREE.Vector3(700, 0, -400),    
            new THREE.Vector3(600, 0, -100),    
            new THREE.Vector3(400, 0, -50),     
            new THREE.Vector3(400, 0, 200),     
            new THREE.Vector3(600, 0, 400),     
            new THREE.Vector3(400, 0, 700),     
            new THREE.Vector3(100, 0, 600),     
            new THREE.Vector3(-200, 0, 700),    
            new THREE.Vector3(-500, 0, 500),    
            new THREE.Vector3(-400, 0, 200),    
            new THREE.Vector3(-600, 0, 0),      
            new THREE.Vector3(-400, 0, -200),   
            new THREE.Vector3(-200, 0, -100),   
            new THREE.Vector3(0, 0, 100)        
        ];
        const trackWidth = 38; 
        let trackCurve;
        let physicsCurvePoints = []; 

        let scene, camera, renderer, clock;
        let playerCar, aiCars = [];
        let obstacles = [];
        let raceStarted = false;
        let raceFinished = false;
        let finalPlayerRank = "--";
        let playerNameStr = "PLAYER 1";
        
        let isCinematicMenu = true;
        let menuCamAngle = 0;

        const activeInputs = { Forward: false, Backward: false, Left: false, Right: false };

        const aiRivals = [
            { color: 0xffaa00, name: "IGNITE", num: "67" },
            { color: 0x8e44ad, name: "PHANTOM", num: "13" },
            { color: 0x00d2ff, name: "FROST", num: "04" },
            { color: 0x00ff66, name: "VENOM", num: "99" },
            { color: 0xff0055, name: "APEX", num: "21" },
            { color: 0xff5500, name: "PULSE", num: "54" },
            { color: 0x333333, name: "SHADOW", num: "36" }
        ];

        function createNumberPlane(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(64, 64, 60, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 75px "Orbitron", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number, 64, 72);
            
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({map: tex, transparent: true});
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 2.4), mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.rotation.z = -Math.PI / 2; 
            mesh.position.y = 0.51; 
            return mesh;
        }

        window.onload = function() {
            init3DWorld();
        };

        function init3DWorld() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.FogExp2(0x020202, 0.0012); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x223344, 1.2);
            scene.add(ambient);

            trackCurve = new THREE.CatmullRomCurve3(trackWaypoints, true);
            physicsCurvePoints = trackCurve.getPoints(2000); 

            buildSceneryAndTrack();
            spawnCustomRaceCars(0xe53e3e); 

            window.addEventListener('keydown', (e) => toggleControls(e, true));
            window.addEventListener('keyup', (e) => toggleControls(e, false));
            window.addEventListener('resize', handleWindowResize);

            animate();
        }

        function changePlayerColor(hexCode, element) {
            if (playerCar) {
                playerCar.mesh.children[0].material.color.setHex(hexCode);
                playerCar.colorHex = hexCode;
            }
            
            document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function initiateRaceSequence() {
            const inputName = document.getElementById('racer-name').value.trim().toUpperCase();
            if(inputName !== "") {
                playerNameStr = inputName;
                if (playerCar) playerCar.label = playerNameStr; 
            }
            
            document.getElementById('menu-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('leaderboard').style.display = 'block';
                isCinematicMenu = false; 
                triggerCountdown();
            }, 500);
        }

        function buildSceneryAndTrack() {
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<1200; i++) {
                starCoords.push((Math.random()-0.5)*3000, Math.random()*500+50, (Math.random()-0.5)*3000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2 })));

            const trackGeo = new THREE.TubeGeometry(trackCurve, 800, trackWidth / 2, 8, true);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.9, emissive: 0x050505 });
            const trackMesh = new THREE.Mesh(trackGeo, trackMat);
            trackMesh.scale.set(1, 0.002, 1); 
            scene.add(trackMesh);

            const flCanvas = document.createElement('canvas');
            flCanvas.width = 1024;
            flCanvas.height = 256;
            const ctx = flCanvas.getContext('2d');

            for(let i=0; i<32; i++) {
                for(let j=0; j<8; j++) {
                    ctx.fillStyle = (i+j)%2 === 0 ? '#ffffff' : '#050505';
                    ctx.fillRect(i*32, j*32, 32, 32);
                }
            }

            const fadeLeft = ctx.createLinearGradient(0, 0, 250, 0);
            fadeLeft.addColorStop(0, '#111');
            fadeLeft.addColorStop(1, 'rgba(17, 17, 17, 0)');
            ctx.fillStyle = fadeLeft;
            ctx.fillRect(0, 0, 250, 256);

            const fadeRight = ctx.createLinearGradient(774, 0, 1024, 0);
            fadeRight.addColorStop(0, 'rgba(17, 17, 17, 0)');
            fadeRight.addColorStop(1, '#111');
            ctx.fillStyle = fadeRight;
            ctx.fillRect(774, 0, 250, 256);

            const flTex = new THREE.CanvasTexture(flCanvas);
            const flMat = new THREE.MeshBasicMaterial({ map: flTex, transparent: true });
            
            const checkeredMesh = new THREE.Mesh(new THREE.PlaneGeometry(38, 10), flMat);
            checkeredMesh.position.set(0, 0.05, 0); 
            checkeredMesh.rotation.x = -Math.PI / 2;
            scene.add(checkeredMesh);

            const poleGeo = new THREE.CylinderGeometry(0.2, 0.3, 14);
            const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 6);
            armGeo.rotateZ(Math.PI / 2);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x222 });
            const lightGlowMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff });

            for (let i = 0; i < 80; i++) {
                const t = i / 80;
                const trackPt = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const polePos = trackPt.clone().addScaledVector(normal, (trackWidth / 2) + 4);
                polePos.y = 0;

                const streetLight = new THREE.Group();
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.y = 7;
                const arm = new THREE.Mesh(armGeo, poleMat);
                arm.position.set(-3, 14, 0);
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), lightGlowMat);
                bulb.position.set(-6, 13.8, 0);

                const spot = new THREE.SpotLight(0xddffff, 14.0, 150, Math.PI / 2.5, 0.5, 0.8);
                spot.position.set(-6, 13.8, 0);
                spot.target.position.copy(trackPt);
                scene.add(spot.target);

                streetLight.add(pole, arm, bulb, spot);
                streetLight.position.copy(polePos);
                streetLight.lookAt(trackPt); 
                scene.add(streetLight);
            }

            buildTrackObstacles();
        }

        function buildTrackObstacles() {
            const placements = [0.12, 0.28, 0.45, 0.65, 0.82];
            
            placements.forEach((t, index) => {
                const pos = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const sideShift = (index % 2 === 0) ? -7 : 7;
                pos.addScaledVector(normal, sideShift);
                pos.y = 0;

                if (index % 2 === 0) {
                    const rampGroup = new THREE.Group();
                    const rampGeo = new THREE.BoxGeometry(8, 1.8, 8);
                    const posAttr = rampGeo.attributes.position;
                    for(let i=0; i<posAttr.count; i++) {
                        if(posAttr.getZ(i) > 0) posAttr.setY(i, posAttr.getY(i) - 0.9);
                    }
                    rampGeo.computeVertexNormals();

                    const rampMesh = new THREE.Mesh(rampGeo, new THREE.MeshStandardMaterial({ color: 0x00d2ff, emissive: 0x003344 }));
                    rampMesh.position.y = 0.9;
                    rampGroup.add(rampMesh);
                    rampGroup.position.copy(pos);
                    rampGroup.lookAt(pos.clone().sub(tangent));
                    scene.add(rampGroup);
                    obstacles.push({ type: 'ramp', position: pos.clone(), radius: 6.0 });
                } else {
                    const holeGeo = new THREE.CylinderGeometry(5.0, 5.0, 0.1, 16);
                    const holeMesh = new THREE.Mesh(holeGeo, new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true }));
                    holeMesh.position.copy(pos);
                    scene.add(holeMesh);
                    obstacles.push({ type: 'pothole', position: pos.clone(), radius: 6.0 });
                }
            });
        }

        // --- CORE VEHICLE PHYSICS ---
        class CustomRaceCar {
            constructor(colorHex, isAI = false, label = "", number = "01") {
                this.isAI = isAI;
                this.label = label;
                this.colorHex = colorHex; 
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.heading = 0;
                this.speed = 0;
                this.lapProgress = 0;
                this.lapsCompleted = 0; 

                this.aiOffset = isAI ? (Math.random() - 0.5) * 18 : 0; 
                this.aiAggression = Math.random();

                this.hasStarted = false;
                this.hasHitCheckpoint25 = false;
                this.hasHitCheckpoint50 = false;
                this.hasHitCheckpoint75 = false;

                this.posY = 0.4;
                this.velY = 0;
                this.isGrounded = true;

                this.acceleration = isAI ? 25.0 : 40.0; 
                this.drag = 0.92;
                this.braking = 55.0;
                this.steeringSensitivity = 3.8; 
                this.maxSpeed = isAI ? 58.0 + (Math.random() * 10) : 75.0; 

                this.mesh = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2 });
                const trimMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.8 });

                const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 5.2), bodyMat);
                body.position.y = 0.25;
                const spoiler = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.15, 0.8), trimMat);
                spoiler.position.set(0, 1.4, -2.4);
                
                const numberDecal = createNumberPlane(number);
                this.mesh.add(body, spoiler, numberDecal);

                const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.7, 12).rotateZ(Math.PI / 2);
                const offsets = [[-1.35, 0.35, 1.7], [1.35, 0.35, 1.7], [-1.35, 0.35, -1.7], [1.35, 0.35, -1.7]];
                offsets.forEach(o => {
                    const w = new THREE.Mesh(wheelGeo, trimMat);
                    w.position.set(o[0], o[1], o[2]);
                    this.mesh.add(w);
                });

                scene.add(this.mesh);
            }

            getSmoothBoundaryPoint(pos) {
                let totalPoints = physicsCurvePoints.length;
                let centerIdx = Math.floor(this.lapProgress * totalPoints);
                
                let closestDistSq = Infinity;
                let closestPt = new THREE.Vector3();

                for (let offset = -30; offset <= 30; offset++) {
                    let i = (centerIdx + offset + totalPoints) % totalPoints;
                    let nextI = (i + 1) % totalPoints;
                    
                    let p1 = physicsCurvePoints[i];
                    let p2 = physicsCurvePoints[nextI];
                    
                    let line = new THREE.Vector3().subVectors(p2, p1);
                    let lenSq = line.lengthSq();
                    let t = 0;
                    if (lenSq !== 0) {
                        let vec = new THREE.Vector3().subVectors(pos, p1);
                        t = Math.max(0, Math.min(1, vec.dot(line) / lenSq));
                    }
                    let proj = new THREE.Vector3().copy(p1).add(line.multiplyScalar(t));
                    
                    let dSq = pos.distanceToSquared(proj);
                    if (dSq < closestDistSq) {
                        closestDistSq = dSq;
                        closestPt.copy(proj);
                    }
                }
                return { point: closestPt, distSq: closestDistSq };
            }

            updateVehiclePhysics(dt, controls) {
                if (raceStarted && !raceFinished) {
                    if (controls.steer !== 0) {
                        this.heading += controls.steer * this.steeringSensitivity * dt;
                    }

                    if (controls.gas > 0) {
                        this.speed += this.acceleration * controls.gas * dt;
                    } else if (controls.brake > 0) {
                        this.speed -= this.braking * controls.brake * dt;
                    } else {
                        this.speed *= Math.pow(this.drag, dt * 10);
                    }

                    this.speed = THREE.MathUtils.clamp(this.speed, -8.0, this.maxSpeed);
                    this.velocity.set(Math.sin(this.heading) * this.speed, 0, Math.cos(this.heading) * this.speed);
                    const nextPos = this.position.clone().addScaledVector(this.velocity, dt);

                    if (!this.isAI) {
                        let boundary = this.getSmoothBoundaryPoint(nextPos);
                        const maxAllowedDist = 16.5; 
                        
                        if (boundary.distSq > maxAllowedDist * maxAllowedDist) {
                            let pushOutDir = new THREE.Vector3().subVectors(nextPos, boundary.point);
                            pushOutDir.y = 0; 
                            
                            // FIX: Critical mathematical safeguard against the "Spinning in the Middle" NaN error
                            if (pushOutDir.lengthSq() < 0.0001) {
                                pushOutDir.set(Math.random(), 0, Math.random());
                            }
                            
                            pushOutDir.normalize();
                            nextPos.copy(boundary.point).add(pushOutDir.multiplyScalar(maxAllowedDist));
                            this.speed *= 0.95; 
                        }
                        
                        this.position.copy(nextPos);
                    } else {
                        this.position.copy(nextPos);
                    }
                    
                    let prevProgress = this.lapProgress;
                    this.calculateLapProgress(false); // Only use localized scanning while driving
                    this.evaluateObstacleIntersections();
                    this.verifyCheckpointSecurityMetrics(prevProgress);
                }

                if (!this.isGrounded) {
                    this.velY -= 22.0 * dt; 
                    this.posY += this.velY * dt;
                    if (this.posY <= 0.4) {
                        this.posY = 0.4;
                        this.velY = 0;
                        this.isGrounded = true;
                    }
                }

                this.mesh.position.copy(this.position);
                this.mesh.position.y = this.posY;
                this.mesh.rotation.y = this.heading;
            }

            evaluateObstacleIntersections() {
                obstacles.forEach(obs => {
                    const flatCarPos = new THREE.Vector2(this.position.x, this.position.z);
                    const flatObsPos = new THREE.Vector2(obs.position.x, obs.position.z);
                    
                    if (flatCarPos.distanceTo(flatObsPos) < obs.radius) {
                        if (obs.type === 'ramp' && this.isGrounded) {
                            this.isGrounded = false;
                            this.velY = 14.0; 
                            this.speed += 8.0; 
                        } else if (obs.type === 'pothole' && this.isGrounded) {
                            this.speed *= 0.40;
                        }
                    }
                });
            }

            verifyCheckpointSecurityMetrics(prevProgress) {
                if (this.lapProgress > 0.1 && this.lapProgress < 0.2) this.hasStarted = true;

                if (this.hasStarted) {
                    if (this.lapProgress > 0.23 && this.lapProgress < 0.35) this.hasHitCheckpoint25 = true;
                    if (this.lapProgress > 0.48 && this.lapProgress < 0.60 && this.hasHitCheckpoint25) this.hasHitCheckpoint50 = true;
                    if (this.lapProgress > 0.73 && this.lapProgress < 0.85 && this.hasHitCheckpoint50) this.hasHitCheckpoint75 = true;

                    if (prevProgress > 0.9 && this.lapProgress < 0.1 && this.hasHitCheckpoint75) {
                        this.lapsCompleted += 1;
                        this.hasHitCheckpoint25 = false; 
                        this.hasHitCheckpoint50 = false;
                        this.hasHitCheckpoint75 = false;
                        
                        if (!this.isAI && !raceFinished) {
                            triggerRaceVictoryEvent();
                        }
                    }
                }
            }

            // FIX: Uses absolute global scanning on initialization, but strict localized scanning while driving to prevent the Teleport Shortcut glitch
            calculateLapProgress(isInit = false) {
                let nearestT = this.lapProgress;
                let minDist = Infinity;
                
                if (isInit) {
                    const scans = 300; 
                    for (let i = 0; i <= scans; i++) {
                        const testT = i / scans;
                        const trackPt = trackCurve.getPointAt(testT);
                        const d = this.position.distanceToSquared(trackPt);
                        if (d < minDist) {
                            minDist = d;
                            nearestT = testT;
                        }
                    }
                } else {
                    for (let offset = -15; offset <= 15; offset++) {
                        let testT = this.lapProgress + (offset / 1000);
                        if (testT < 0) testT += 1.0;
                        if (testT > 1.0) testT -= 1.0;
                        
                        const trackPt = trackCurve.getPointAt(testT);
                        const d = this.position.distanceToSquared(trackPt);
                        if (d < minDist) {
                            minDist = d;
                            nearestT = testT;
                        }
                    }
                }
                this.lapProgress = nearestT;
            }
        }

        function spawnCustomRaceCars(playerColor) {
            playerCar = new CustomRaceCar(playerColor, false, playerNameStr, "01");
            playerCar.position.set(-6, 0.4, 20); 
            playerCar.heading = Math.PI; 

            const startPositions = [
                {x: 6, z: 20},  {x: -6, z: 40}, {x: 6, z: 40}, 
                {x: -6, z: 60}, {x: 6, z: 60},  {x: -6, z: 80}, {x: 6, z: 80}
            ];

            for (let i = 0; i < 7; i++) {
                const aiData = aiRivals[i];
                const ai = new CustomRaceCar(aiData.color, true, aiData.name, aiData.num);
                ai.position.set(startPositions[i].x, 0.4, startPositions[i].z);
                ai.heading = Math.PI;
                aiCars.push(ai);
            }

            playerCar.calculateLapProgress(true);
            playerCar.mesh.position.copy(playerCar.position);
            playerCar.mesh.rotation.y = playerCar.heading;
            
            aiCars.forEach(ai => {
                ai.calculateLapProgress(true);
                ai.mesh.position.copy(ai.position);
                ai.mesh.rotation.y = ai.heading;
            });
        }

        function triggerCountdown() {
            const box = document.getElementById('countdown-box');
            box.style.display = 'block';
            let timerVal = 3;
            
            const interval = setInterval(() => {
                timerVal--;
                if(timerVal === 0) {
                    box.innerText = "GO!";
                    box.style.color = "#00d2ff";
                    raceStarted = true;
                } else if (timerVal < 0) {
                    clearInterval(interval);
                    box.style.display = 'none';
                } else {
                    box.innerText = timerVal;
                }
            }, 1000);
        }

        function toggleControls(e, isPressed) {
            switch(e.key) {
                case 'w': case 'W': case 'ArrowUp': activeInputs.Forward = isPressed; break;
                case 's': case 'S': case 'ArrowDown': activeInputs.Backward = isPressed; break;
                case 'a': case 'A': case 'ArrowLeft': activeInputs.Left = isPressed; break;
                case 'd': case 'D': case 'ArrowRight': activeInputs.Right = isPressed; break;
            }
        }

        function runAIAutonomousLogic(car, dt) {
            if (!raceStarted) return; 

            let lookaheadT = car.lapProgress + 0.015; 
            if (lookaheadT > 1.0) lookaheadT -= 1.0;

            const baseTarget = trackCurve.getPointAt(lookaheadT);
            const tangent = trackCurve.getTangentAt(lookaheadT);
            const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
            
            const target = baseTarget.clone().addScaledVector(normal, car.aiOffset);

            const desiredAngle = Math.atan2(target.x - car.position.x, target.z - car.position.z);
            let angularErr = desiredAngle - car.heading;

            while (angularErr < -Math.PI) angularErr += Math.PI * 2;
            while (angularErr > Math.PI) angularErr -= Math.PI * 2;

            let steerVal = 0;
            if (Math.abs(angularErr) > 0.05) steerVal = angularErr > 0 ? 1 : -1;
            
            const curveDampener = Math.abs(angularErr) > 0.3 ? (0.3 + car.aiAggression * 0.4) : 1.0;

            car.updateVehiclePhysics(dt, { gas: curveDampener, brake: 0, steer: steerVal });
        }

        function computeLeaderboardPositions() {
            if(!playerCar) return;
            let pack = [playerCar, ...aiCars];
            
            pack.sort((a, b) => (b.lapsCompleted + b.lapProgress) - (a.lapsCompleted + a.lapProgress));
            
            let foundIdx = pack.findIndex(c => c.label === playerNameStr);
            let rank = (foundIdx !== -1) ? (foundIdx + 1) : 1; 
            
            const suffix = ["ST", "ND", "RD", "TH", "TH", "TH", "TH", "TH"][rank - 1];
            const displayRank = rank + suffix;
            
            if(!raceFinished) {
                document.getElementById('place-display').innerText = displayRank;
                finalPlayerRank = displayRank;
            }
            
            return pack; 
        }

        function triggerRaceVictoryEvent() {
            raceFinished = true;
            raceStarted = false;
            
            const finalPack = computeLeaderboardPositions();
            
            let lbHTML = "";
            finalPack.forEach((car, index) => {
                let suffix = ["ST", "ND", "RD", "TH", "TH", "TH", "TH", "TH"][index];
                let rankStr = (index + 1) + suffix;
                let colorHex = "#" + car.colorHex.toString(16).padStart(6, '0');
                
                let isPlayer = car.label === playerNameStr ? "player-row" : "";
                let progressStr = car.lapsCompleted > 0 ? "FINISH" : Math.floor(car.lapProgress * 100) + "%";

                lbHTML += `
                <div class="lb-row ${isPlayer}">
                    <div class="lb-rank">${rankStr}</div>
                    <div class="lb-name" style="color: ${colorHex};">${car.label}</div>
                    <div class="lb-score">${progressStr}</div>
                </div>`;
            });

            document.getElementById('final-leaderboard-container').innerHTML = lbHTML;
            document.getElementById('victory-screen').style.display = 'flex';
            document.getElementById('confetti-canvas').style.display = 'block';
            
            initConfettiScript();
        }

        let confettiPieces = [];
        function initConfettiScript() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for(let i=0; i<150; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: `hsl(${Math.random()*360}, 100%, 60%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function drawConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiPieces.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    if (p.y > canvas.height) {
                        confettiPieces[index] = p;
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(drawConfettiFrame);
            }
            drawConfettiFrame();
        }

        function handleWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            if (isCinematicMenu) {
                menuCamAngle += 0.003;
                camera.position.set(Math.sin(menuCamAngle) * 50, 20, 20 + Math.cos(menuCamAngle) * 40);
                camera.lookAt(0, 0, 40); 
            } else {
                const playerCommands = {
                    gas: activeInputs.Forward ? 1.0 : 0.0,
                    brake: activeInputs.Backward ? 1.0 : 0.0,
                    steer: (activeInputs.Left ? 1.0 : 0.0) - (activeInputs.Right ? 1.0 : 0.0)
                };

                if (playerCar) playerCar.updateVehiclePhysics(dt, playerCommands);
                aiCars.forEach(ai => runAIAutonomousLogic(ai, dt));
                
                computeLeaderboardPositions();

                if (playerCar) {
                    const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
                    const targetCamPos = playerCar.position.clone().add(cameraOffset);
                    
                    const lerpFactor = Math.min(1.0, 10.0 * dt);
                    camera.position.lerp(targetCamPos, lerpFactor);
                    
                    camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

                    document.getElementById('speed-out').innerText = Math.floor(playerCar.speed * 2.2); 
                }
            }

            renderer.render(scene, camera);
        }
    </script>
