<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Circuit - Grand Prix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Outfit', sans-serif; background-color: #000; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        /* Premium Glassmorphism Menu */
        #menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle at center, rgba(10,15,30,0.85) 0%, rgba(2,3,5,0.98) 100%);
            z-index: 100; display: flex; align-items: center; justify-content: center; color: white;
        }
        
        .menu-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 60px 80px;
            border-radius: 24px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            max-width: 900px;
        }

        .title-racer { 
            font-size: 5.5em; margin: 0; color: #ffffff; 
            text-transform: uppercase; font-weight: 900; letter-spacing: -2px; line-height: 1;
        }
        .subtitle { color: #a0aec0; margin: 10px 0 40px 0; font-size: 1.2em; font-weight: 500; letter-spacing: 8px; text-transform: uppercase; }
        
        .name-input { 
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 12px;
            padding: 18px 25px; font-size: 1.5em; font-family: 'Outfit', sans-serif; font-weight: 800;
            text-align: center; outline: none; width: 75%; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s;
            margin-bottom: 40px;
        }
        .name-input:focus { background: rgba(0,0,0,0.5); border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .name-input::placeholder { color: #718096; font-weight: 500; }

        .btn-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .car-card {
            background: transparent; border: none;
            padding: 10px; border-radius: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 110px;
        }
        .car-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.05); }
        .color-preview { height: 60px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .car-card:hover .color-preview { transform: scale(1.05); }
        .car-name { font-size: 0.9em; font-weight: 800; text-transform: uppercase; color: #e2e8f0; letter-spacing: 1px; }

        #countdown-box { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 15em; font-weight: 900; color: #fff; z-index: 50; pointer-events: none; text-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none; }
        
        #leaderboard { position: absolute; top: 30px; right: 30px; z-index: 10; background: rgba(0, 0, 0, 0.5); color: #fff; padding: 20px 40px; border-radius: 16px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #place-display { font-size: 4em; font-weight: 900; color: #fff; text-align: center; margin-top: -5px; line-height: 1; }
        
        #dashboard { position: absolute; bottom: 30px; left: 30px; z-index: 10; background: rgba(0, 0, 0, 0.5); color: #fff; padding: 20px 40px; border-radius: 16px; font-family: 'Outfit', sans-serif; pointer-events: none; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .stat { font-size: 1.8em; margin: 0; font-weight: 500; letter-spacing: 1px; color: #a0aec0; }
        .stat span { color: #fff; font-weight: 900; }

        /* Victory Overlay */
        #victory-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 90; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(15px); }
        #victory-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 50px 70px; border-radius: 24px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.9); min-width: 600px; backdrop-filter: blur(20px); }
        #victory-card h2 { font-size: 4em; margin: 0; color: #fff; text-transform: uppercase; font-weight: 900; letter-spacing: -1px; }
        #victory-place { font-size: 1.2em; margin: 15px 0 30px 0; color: #a0aec0; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; }
        
        #final-leaderboard-container { width: 100%; margin-bottom: 40px; }
        .lb-row { display: flex; justify-content: space-between; padding: 15px 25px; background: rgba(0,0,0,0.4); margin-bottom: 8px; border-radius: 12px; font-size: 1.5em; font-weight: 800; align-items: center; border: 1px solid transparent; }
        .lb-row.player-row { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); }
        .lb-rank { width: 40px; color: #a0aec0; text-align: left; }
        .lb-name { flex-grow: 1; text-align: left; margin-left: 20px; letter-spacing: 1px; }
        .lb-score { color: #fff; }

        .restart-btn { background: #fff; color: #000; border: none; border-radius: 12px; padding: 20px 60px; font-weight: 900; cursor: pointer; font-size: 1.4em; text-transform: uppercase; transition: 0.3s; letter-spacing: 2px; font-family: 'Outfit', sans-serif; }
        .restart-btn:hover { background: #e2e8f0; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,255,255,0.2); }
        
        #confetti-canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 95; pointer-events: none; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-panel">
            <h1 class="title-racer">Grand Prix</h1>
            <p class="subtitle">Ultimate Simulator</p>
            
            <input type="text" id="racer-name" class="name-input" placeholder="ENTER DRIVER ID" maxlength="14" autocomplete="off">
            
            <div class="btn-grid">
                <div class="car-card" onclick="startRaceSimulation(0xe53e3e)">
                    <div class="color-preview" style="background: linear-gradient(135deg, #ff4b4b, #b91c1c);"></div>
                    <div class="car-name">Formula Red</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0xffaa00)">
                    <div class="color-preview" style="background: linear-gradient(135deg, #ffd000, #c27800);"></div>
                    <div class="car-name">Liquid Gold</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0x0066ff)">
                    <div class="color-preview" style="background: linear-gradient(135deg, #3388ff, #0033cc);"></div>
                    <div class="car-name">Cobalt Blue</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0x00ff66)">
                    <div class="color-preview" style="background: linear-gradient(135deg, #33ff88, #009933);"></div>
                    <div class="car-name">Neon Viper</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0xff007f)">
                    <div class="color-preview" style="background: linear-gradient(135deg, #ff3399, #99004d);"></div>
                    <div class="car-name">Cyber Pink</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0xff5500)">
                    <div class="color-preview" style="background: linear-gradient(135deg, #ff7733, #b33c00);"></div>
                    <div class="car-name">Blaze Orange</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0x1a1a1a)">
                    <div class="color-preview" style="background: linear-gradient(135deg, #333333, #000000); border-color: #444;"></div>
                    <div class="car-name">Stealth Black</div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="victory-screen">
        <div id="victory-card">
            <h2>RACE COMPLETE</h2>
            <div id="victory-place">OFFICIAL STANDINGS</div>
            <div id="final-leaderboard-container"></div>
            <button class="restart-btn" onclick="window.location.reload()">Return to Garage</button>
        </div>
    </div>

    <div id="countdown-box">3</div>

    <div id="leaderboard">
        <div style="font-size: 1.2em; text-transform: uppercase; font-weight: 800; color: #a0aec0;">Position</div>
        <div id="place-display">--</div>
    </div>

    <div id="dashboard">
        <div class="stat">SPEED: <span id="speed-out">0</span> MPH</div>
        <div class="stat">LAP: <span id="pos-out">1 / 1</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- MASSIVELY EXTENDED TRACK (More lefts, rights, technical corners) ---
        const trackWaypoints = [
            new THREE.Vector3(0, 0, 0),         // Start Line
            new THREE.Vector3(0, 0, -400),      // Fast Front Straight
            new THREE.Vector3(200, 0, -600),    // Sweeping Right
            new THREE.Vector3(500, 0, -600),    // Short Straight
            new THREE.Vector3(700, 0, -400),    // Hard Right
            new THREE.Vector3(600, 0, -100),    // Left hairpin entry
            new THREE.Vector3(400, 0, -50),     // Left hairpin exit
            new THREE.Vector3(400, 0, 200),     // Tech Straight
            new THREE.Vector3(600, 0, 400),     // Right Sweeper
            new THREE.Vector3(400, 0, 700),     // Hard Right 
            new THREE.Vector3(100, 0, 600),     // Long Left Curve
            new THREE.Vector3(-200, 0, 700),    // Right Sweeper
            new THREE.Vector3(-500, 0, 500),    // Hard Left
            new THREE.Vector3(-400, 0, 200),    // Back Straight
            new THREE.Vector3(-600, 0, 0),      // Sharp Right Hairpin
            new THREE.Vector3(-400, 0, -200),   // Hairpin exit
            new THREE.Vector3(-200, 0, -100),   // Left Kink
            new THREE.Vector3(0, 0, 100)        // Approach to start/finish
        ];
        const trackWidth = 38; // Slightly wider for massive pack
        let trackCurve;
        let physicsCurvePoints = []; 

        let scene, camera, renderer, clock;
        let playerCar, aiCars = [];
        let obstacles = [];
        let raceStarted = false;
        let raceFinished = false;
        let finalPlayerRank = "--";
        let playerNameStr = "PLAYER";
        
        const activeInputs = { Forward: false, Backward: false, Left: false, Right: false };

        const aiRivals = [
            { color: 0xffaa00, name: "IGNITE", num: "77" },
            { color: 0x8e44ad, name: "PHANTOM", num: "13" },
            { color: 0x00ffff, name: "FROST", num: "04" },
            { color: 0x99ff00, name: "VENOM", num: "99" },
            { color: 0xff0055, name: "APEX", num: "21" },
            { color: 0xff5500, name: "PULSE", num: "55" },
            { color: 0x333333, name: "SHADOW", num: "00" }
        ];

        // Generates the racing number decals for the roof
        function createNumberPlane(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(64, 64, 60, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 75px "Outfit", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number, 64, 70);
            
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.MeshBasicMaterial({map: tex, transparent: true});
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 2.2), mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.rotation.z = -Math.PI / 2; // Orient forward
            mesh.position.y = 0.51; // Float just above car body
            return mesh;
        }

        function startRaceSimulation(chosenColor) {
            const inputName = document.getElementById('racer-name').value.trim().toUpperCase();
            if(inputName !== "") playerNameStr = inputName;
            
            document.getElementById('menu-overlay').style.display = 'none';
            init(chosenColor);
            triggerCountdown();
        }

        function init(playerColor) {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.0012); // Pushed back for larger track

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2500);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x223355, 0.9);
            scene.add(ambient);

            trackCurve = new THREE.CatmullRomCurve3(trackWaypoints, true);
            // Increased to 1200 cache points to prevent glitching on massive track
            physicsCurvePoints = trackCurve.getPoints(1200);

            buildSceneryAndTrack();
            spawnCustomRaceCars(playerColor);

            window.addEventListener('keydown', (e) => toggleControls(e, true));
            window.addEventListener('keyup', (e) => toggleControls(e, false));
            window.addEventListener('resize', handleWindowResize);

            // INSTANT CAMERA LOCK
            const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
            camera.position.copy(playerCar.position.clone().add(cameraOffset));
            camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

            animate();
        }

        function buildSceneryAndTrack() {
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<1200; i++) {
                starCoords.push((Math.random()-0.5)*3000, Math.random()*500+50, (Math.random()-0.5)*3000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2 })));

            const trackGeo = new THREE.TubeGeometry(trackCurve, 800, trackWidth / 2, 8, true);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x11131a, roughness: 0.9, emissive: 0x020305 });
            const trackMesh = new THREE.Mesh(trackGeo, trackMat);
            trackMesh.scale.set(1, 0.002, 1); 
            scene.add(trackMesh);

            const flCanvas = document.createElement('canvas');
            flCanvas.width = 1024;
            flCanvas.height = 256;
            const ctx = flCanvas.getContext('2d');

            for(let i=0; i<32; i++) {
                for(let j=0; j<8; j++) {
                    ctx.fillStyle = (i+j)%2 === 0 ? '#ffffff' : '#050505';
                    ctx.fillRect(i*32, j*32, 32, 32);
                }
            }

            const fadeLeft = ctx.createLinearGradient(0, 0, 250, 0);
            fadeLeft.addColorStop(0, '#11131a');
            fadeLeft.addColorStop(1, 'rgba(17, 19, 26, 0)');
            ctx.fillStyle = fadeLeft;
            ctx.fillRect(0, 0, 250, 256);

            const fadeRight = ctx.createLinearGradient(774, 0, 1024, 0);
            fadeRight.addColorStop(0, 'rgba(17, 19, 26, 0)');
            fadeRight.addColorStop(1, '#11131a');
            ctx.fillStyle = fadeRight;
            ctx.fillRect(774, 0, 250, 256);

            const flTex = new THREE.CanvasTexture(flCanvas);
            const flMat = new THREE.MeshBasicMaterial({ map: flTex, transparent: true });
            
            const checkeredMesh = new THREE.Mesh(new THREE.PlaneGeometry(38, 10), flMat);
            checkeredMesh.position.set(0, 0.05, 0); 
            checkeredMesh.rotation.x = -Math.PI / 2;
            scene.add(checkeredMesh);

            const poleGeo = new THREE.CylinderGeometry(0.2, 0.3, 14);
            const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 6);
            armGeo.rotateZ(Math.PI / 2);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x222 });
            const lightGlowMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            for (let i = 0; i < 80; i++) {
                const t = i / 80;
                const trackPt = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const polePos = trackPt.clone().addScaledVector(normal, (trackWidth / 2) + 4);
                polePos.y = 0;

                const streetLight = new THREE.Group();
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.y = 7;
                const arm = new THREE.Mesh(armGeo, poleMat);
                arm.position.set(-3, 14, 0);
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), lightGlowMat);
                bulb.position.set(-6, 13.8, 0);

                const spot = new THREE.SpotLight(0xffffff, 14.0, 120, Math.PI / 2.5, 0.5, 0.8);
                spot.position.set(-6, 13.8, 0);
                spot.target.position.copy(trackPt);
                scene.add(spot.target);

                streetLight.add(pole, arm, bulb, spot);
                streetLight.position.copy(polePos);
                streetLight.lookAt(trackPt); 
                scene.add(streetLight);
            }

            buildTrackObstacles();
        }

        function buildTrackObstacles() {
            const placements = [0.12, 0.28, 0.45, 0.65, 0.82];
            
            placements.forEach((t, index) => {
                const pos = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const sideShift = (index % 2 === 0) ? -7 : 7;
                pos.addScaledVector(normal, sideShift);
                pos.y = 0;

                if (index % 2 === 0) {
                    const rampGroup = new THREE.Group();
                    const rampGeo = new THREE.BoxGeometry(8, 1.8, 8);
                    const posAttr = rampGeo.attributes.position;
                    for(let i=0; i<posAttr.count; i++) {
                        if(posAttr.getZ(i) > 0) posAttr.setY(i, posAttr.getY(i) - 0.9);
                    }
                    rampGeo.computeVertexNormals();

                    const rampMesh = new THREE.Mesh(rampGeo, new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 }));
                    rampMesh.position.y = 0.9;
                    rampGroup.add(rampMesh);
                    rampGroup.position.copy(pos);
                    rampGroup.lookAt(pos.clone().sub(tangent));
                    scene.add(rampGroup);
                    obstacles.push({ type: 'ramp', position: pos.clone(), radius: 6.0 });
                } else {
                    const holeGeo = new THREE.CylinderGeometry(5.0, 5.0, 0.1, 16);
                    const holeMesh = new THREE.Mesh(holeGeo, new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true }));
                    holeMesh.position.copy(pos);
                    scene.add(holeMesh);
                    obstacles.push({ type: 'pothole', position: pos.clone(), radius: 6.0 });
                }
            });
        }

        // --- CORE VEHICLE PHYSICS ---
        class CustomRaceCar {
            constructor(colorHex, isAI = false, label = "", number = "01") {
                this.isAI = isAI;
                this.label = label;
                this.colorHex = colorHex; 
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.heading = 0;
                this.speed = 0;
                this.lapProgress = 0;
                this.lapsCompleted = 0; 

                this.aiOffset = isAI ? (Math.random() - 0.5) * 18 : 0; 
                this.aiAggression = Math.random();

                this.hasStarted = false;
                this.hasHitCheckpoint25 = false;
                this.hasHitCheckpoint50 = false;
                this.hasHitCheckpoint75 = false;

                this.posY = 0.4;
                this.velY = 0;
                this.isGrounded = true;

                this.acceleration = isAI ? 25.0 : 38.0; 
                this.drag = 0.92;
                this.braking = 50.0;
                this.steeringSensitivity = 3.8; 
                this.maxSpeed = isAI ? 58.0 + (Math.random() * 10) : 70.0; 

                this.mesh = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2 });
                const trimMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.8 });

                const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 5.2), bodyMat);
                body.position.y = 0.25;
                const spoiler = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.15, 0.8), trimMat);
                spoiler.position.set(0, 1.4, -2.4);
                
                // Add the racing number decal to the roof
                const numberDecal = createNumberPlane(number);
                
                this.mesh.add(body, spoiler, numberDecal);

                const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.7, 12).rotateZ(Math.PI / 2);
                const offsets = [[-1.35, 0.35, 1.7], [1.35, 0.35, 1.7], [-1.35, 0.35, -1.7], [1.35, 0.35, -1.7]];
                offsets.forEach(o => {
                    const w = new THREE.Mesh(wheelGeo, trimMat);
                    w.position.set(o[0], o[1], o[2]);
                    this.mesh.add(w);
                });

                scene.add(this.mesh);
            }

            updateVehiclePhysics(dt, controls) {
                if (raceStarted && !raceFinished) {
                    if (controls.steer !== 0) {
                        this.heading += controls.steer * this.steeringSensitivity * dt;
                    }

                    if (controls.gas > 0) {
                        this.speed += this.acceleration * controls.gas * dt;
                    } else if (controls.brake > 0) {
                        this.speed -= this.braking * controls.brake * dt;
                    } else {
                        this.speed *= Math.pow(this.drag, dt * 10);
                    }

                    this.speed = THREE.MathUtils.clamp(this.speed, -8.0, this.maxSpeed);
                    this.velocity.set(Math.sin(this.heading) * this.speed, 0, Math.cos(this.heading) * this.speed);
                    const nextPos = this.position.clone().addScaledVector(this.velocity, dt);

                    if (!this.isAI) {
                        if (this.checkCircuitContainment(nextPos)) {
                            this.position.copy(nextPos);
                        } else {
                            this.speed *= -0.5; 
                            this.heading += Math.PI * 0.05 * (controls.steer >= 0 ? -1 : 1); 
                            this.position.addScaledVector(this.velocity, -dt * 0.4);
                        }
                    } else {
                        this.position.copy(nextPos);
                    }
                    
                    let prevProgress = this.lapProgress;
                    this.calculateLapProgress();
                    this.evaluateObstacleIntersections();
                    this.verifyCheckpointSecurityMetrics(prevProgress);
                }

                if (!this.isGrounded) {
                    this.velY -= 22.0 * dt; 
                    this.posY += this.velY * dt;
                    if (this.posY <= 0.4) {
                        this.posY = 0.4;
                        this.velY = 0;
                        this.isGrounded = true;
                    }
                }

                this.mesh.position.copy(this.position);
                this.mesh.position.y = this.posY;
                this.mesh.rotation.y = this.heading;
            }

            checkCircuitContainment(provisionalPos) {
                let shortestDistSq = Infinity;
                for (let i = 0; i < physicsCurvePoints.length; i++) {
                    const distSq = provisionalPos.distanceToSquared(physicsCurvePoints[i]);
                    if (distSq < shortestDistSq) shortestDistSq = distSq;
                }
                return shortestDistSq <= ((trackWidth/2) * (trackWidth/2));
            }

            evaluateObstacleIntersections() {
                obstacles.forEach(obs => {
                    const flatCarPos = new THREE.Vector2(this.position.x, this.position.z);
                    const flatObsPos = new THREE.Vector2(obs.position.x, obs.position.z);
                    
                    if (flatCarPos.distanceTo(flatObsPos) < obs.radius) {
                        if (obs.type === 'ramp' && this.isGrounded) {
                            this.isGrounded = false;
                            this.velY = 14.0; 
                            this.speed += 8.0; 
                        } else if (obs.type === 'pothole' && this.isGrounded) {
                            this.speed *= 0.40;
                        }
                    }
                });
            }

            verifyCheckpointSecurityMetrics(prevProgress) {
                if (this.lapProgress > 0.1 && this.lapProgress < 0.2) this.hasStarted = true;

                if (this.hasStarted) {
                    if (this.lapProgress > 0.23 && this.lapProgress < 0.35) this.hasHitCheckpoint25 = true;
                    if (this.lapProgress > 0.48 && this.lapProgress < 0.60 && this.hasHitCheckpoint25) this.hasHitCheckpoint50 = true;
                    if (this.lapProgress > 0.73 && this.lapProgress < 0.85 && this.hasHitCheckpoint50) this.hasHitCheckpoint75 = true;

                    if (prevProgress > 0.9 && this.lapProgress < 0.1 && this.hasHitCheckpoint75) {
                        this.lapsCompleted += 1;
                        this.hasHitCheckpoint25 = false; 
                        this.hasHitCheckpoint50 = false;
                        this.hasHitCheckpoint75 = false;
                        
                        if (!this.isAI && !raceFinished) {
                            triggerRaceVictoryEvent();
                        }
                    }
                }
            }

            calculateLapProgress() {
                let nearestT = 0;
                let minDist = Infinity;
                const scans = 350; // Increased scans for massively long track accuracy
                for (let i = 0; i <= scans; i++) {
                    const testT = i / scans;
                    const trackPt = trackCurve.getPointAt(testT);
                    const d = this.position.distanceToSquared(trackPt);
                    if (d < minDist) {
                        minDist = d;
                        nearestT = testT;
                    }
                }
                this.lapProgress = nearestT;
            }
        }

        function spawnCustomRaceCars(playerColor) {
            playerCar = new CustomRaceCar(playerColor, false, playerNameStr, "01");
            playerCar.position.set(-6, 0.4, 20); 
            playerCar.heading = Math.PI; 

            const startPositions = [
                {x: 6, z: 20},  {x: -6, z: 40}, {x: 6, z: 40}, 
                {x: -6, z: 60}, {x: 6, z: 60},  {x: -6, z: 80}, {x: 6, z: 80}
            ];

            for (let i = 0; i < 7; i++) {
                const aiData = aiRivals[i];
                const ai = new CustomRaceCar(aiData.color, true, aiData.name, aiData.num);
                ai.position.set(startPositions[i].x, 0.4, startPositions[i].z);
                ai.heading = Math.PI;
                aiCars.push(ai);
            }

            playerCar.calculateLapProgress();
            playerCar.mesh.position.copy(playerCar.position);
            playerCar.mesh.rotation.y = playerCar.heading;
            
            aiCars.forEach(ai => {
                ai.calculateLapProgress();
                ai.mesh.position.copy(ai.position);
                ai.mesh.rotation.y = ai.heading;
            });
        }

        function triggerCountdown() {
            const box = document.getElementById('countdown-box');
            box.style.display = 'block';
            let timerVal = 3;
            
            const interval = setInterval(() => {
                timerVal--;
                if(timerVal === 0) {
                    box.innerText = "GO!";
                    box.style.color = "#fff";
                    raceStarted = true;
                } else if (timerVal < 0) {
                    clearInterval(interval);
                    box.style.display = 'none';
                } else {
                    box.innerText = timerVal;
                }
            }, 1000);
        }

        function toggleControls(e, isPressed) {
            switch(e.key) {
                case 'w': case 'W': case 'ArrowUp': activeInputs.Forward = isPressed; break;
                case 's': case 'S': case 'ArrowDown': activeInputs.Backward = isPressed; break;
                case 'a': case 'A': case 'ArrowLeft': activeInputs.Left = isPressed; break;
                case 'd': case 'D': case 'ArrowRight': activeInputs.Right = isPressed; break;
            }
        }

        function runAIAutonomousLogic(car, dt) {
            if (!raceStarted) return; 

            let lookaheadT = car.lapProgress + 0.015; // Slightly reduced lookahead for sharper curves
            if (lookaheadT > 1.0) lookaheadT -= 1.0;

            const baseTarget = trackCurve.getPointAt(lookaheadT);
            const tangent = trackCurve.getTangentAt(lookaheadT);
            const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
            
            const target = baseTarget.clone().addScaledVector(normal, car.aiOffset);

            const desiredAngle = Math.atan2(target.x - car.position.x, target.z - car.position.z);
            let angularErr = desiredAngle - car.heading;

            while (angularErr < -Math.PI) angularErr += Math.PI * 2;
            while (angularErr > Math.PI) angularErr -= Math.PI * 2;

            let steerVal = 0;
            if (Math.abs(angularErr) > 0.05) steerVal = angularErr > 0 ? 1 : -1;
            
            const curveDampener = Math.abs(angularErr) > 0.3 ? (0.3 + car.aiAggression * 0.4) : 1.0;

            car.updateVehiclePhysics(dt, { gas: curveDampener, brake: 0, steer: steerVal });
        }

        function computeLeaderboardPositions() {
            if(!playerCar) return;
            let pack = [playerCar, ...aiCars];
            
            pack.sort((a, b) => (b.lapsCompleted + b.lapProgress) - (a.lapsCompleted + a.lapProgress));
            
            const rank = pack.findIndex(c => c.label === playerNameStr) + 1;
            const suffix = ["ST", "ND", "RD", "TH", "TH", "TH", "TH", "TH"][rank - 1];
            const displayRank = rank + suffix;
            
            if(!raceFinished) {
                document.getElementById('place-display').innerText = displayRank;
                finalPlayerRank = displayRank;
            }
            
            return pack; 
        }

        function triggerRaceVictoryEvent() {
            raceFinished = true;
            raceStarted = false;
            
            const finalPack = computeLeaderboardPositions();
            
            let lbHTML = "";
            finalPack.forEach((car, index) => {
                let suffix = ["ST", "ND", "RD", "TH", "TH", "TH", "TH", "TH"][index];
                let rankStr = (index + 1) + suffix;
                let colorHex = "#" + car.colorHex.toString(16).padStart(6, '0');
                
                let isPlayer = car.label === playerNameStr ? "player-row" : "";
                let progressStr = car.lapsCompleted > 0 ? "FINISHED" : Math.floor(car.lapProgress * 100) + "%";

                lbHTML += `
                <div class="lb-row ${isPlayer}">
                    <div class="lb-rank">${rankStr}</div>
                    <div class="lb-name" style="color: ${colorHex};">${car.label}</div>
                    <div class="lb-score">${progressStr}</div>
                </div>`;
            });

            document.getElementById('final-leaderboard-container').innerHTML = lbHTML;
            document.getElementById('victory-screen').style.display = 'flex';
            document.getElementById('confetti-canvas').style.display = 'block';
            
            initConfettiScript();
        }

        let confettiPieces = [];
        function initConfettiScript() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for(let i=0; i<150; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: `hsl(${Math.random()*360}, 100%, 60%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function drawConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiPieces.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    if (p.y > canvas.height) {
                        confettiPieces[index] = p;
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(drawConfettiFrame);
            }
            drawConfettiFrame();
        }

        function handleWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            const playerCommands = {
                gas: activeInputs.Forward ? 1.0 : 0.0,
                brake: activeInputs.Backward ? 1.0 : 0.0,
                steer: (activeInputs.Left ? 1.0 : 0.0) - (activeInputs.Right ? 1.0 : 0.0)
            };

            if (playerCar) playerCar.updateVehiclePhysics(dt, playerCommands);
            aiCars.forEach(ai => runAIAutonomousLogic(ai, dt));
            
            computeLeaderboardPositions();

            if (playerCar) {
                const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
                const targetCamPos = playerCar.position.clone().add(cameraOffset);
                camera.position.lerp(targetCamPos, 0.12);
                camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

                document.getElementById('speed-out').innerText = Math.floor(playerCar.speed * 2.2); 
            }

            renderer.render(scene, camera);
        }
    </script>
