<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Night Oval Racer - High Visibility Pro Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #020208; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 12, 24, 0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #menu-overlay h1 { margin: 0 0 10px 0; font-size: 2.8em; color: #64ffda; text-transform: uppercase; letter-spacing: 2px; }
        .color-btn { padding: 14px 28px; margin: 10px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .color-btn:hover { transform: scale(1.05); }
        
        #countdown-box { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 7em; font-weight: bold; color: #ff0055; z-index: 50; pointer-events: none; text-shadow: 0 0 25px rgba(255,0,85,0.7); display: none; font-family: monospace; }
        
        #leaderboard { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(10, 25, 47, 0.9); color: #fff; padding: 12px 25px; border-radius: 8px; border: 2px solid #64ffda; }
        #place-display { font-size: 2.5em; font-weight: bold; color: #64ffda; font-family: monospace; text-align: center; }
        
        #dashboard { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(10, 25, 47, 0.85); color: #64ffda; padding: 15px 25px; border-radius: 8px; border: 1px solid #172a45; font-family: monospace; pointer-events: none; }
        .stat { font-size: 1.1em; margin: 3px 0; }

        #victory-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 12, 24, 0.85); z-index: 90; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(8px); }
        #victory-card { background: #112240; border: 3px solid #64ffda; padding: 40px 60px; border-radius: 16px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        #victory-card h2 { font-size: 3.5em; margin: 0; color: #ff007f; text-transform: uppercase; }
        #victory-place { font-size: 2.5em; margin: 15px 0; color: #64ffda; font-weight: bold; }
        .restart-btn { background: #64ffda; color: #0a192f; border: none; padding: 12px 30px; font-weight: bold; border-radius: 20px; cursor: pointer; margin-top: 15px; font-size: 1.1em; }
        
        #confetti-canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 95; pointer-events: none; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <h1>Night Shift: Oval Raceway</h1>
        <p style="color: #8892b0; margin-bottom: 25px; font-size: 1.1em;">Select your racing color livery to enter the grid:</p>
        <div>
            <button class="color-btn" style="background: #e53e3e; color: white;" onclick="startRaceSimulation(0xe53e3e)">Formula Red</button>
            <button class="color-btn" style="background: #d69e2e; color: white;" onclick="startRaceSimulation(0xd69e2e)">Liquid Gold</button>
            <button class="color-btn" style="background: #00ff66; color: black;" onclick="startRaceSimulation(0x00ff66)">Neon Viper</button>
            <button class="color-btn" style="background: #ff007f; color: white;" onclick="startRaceSimulation(0xff007f)">Cyber Pink</button>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="victory-screen">
        <div id="victory-card">
            <h2>🏆 RACE COMPLETE 🏆</h2>
            <p style="font-size: 1.3em; margin: 10px 0 0; color: #ccd6f6;">You crossed the finish line!</p>
            <div id="victory-place">FINAL STANDING: --</div>
            <button class="restart-btn" onclick="window.location.reload()">Race Again</button>
        </div>
    </div>

    <div id="countdown-box">3</div>

    <div id="leaderboard">
        <div style="font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; color: #8892b0;">Position</div>
        <div id="place-display">--</div>
    </div>

    <div id="dashboard">
        <div class="stat">SPEED: <span id="speed-out">0.00</span> m/s</div>
        <div class="stat">PROGRESS: <span id="pos-out">0%</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- CLEAN RACING OVAL CIRCUIT ---
        const trackWaypoints = [
            new THREE.Vector3(0, 0, 120),       // Checkered Finish Line Baseline 
            new THREE.Vector3(90, 0, 120),      // Turn 1 Entrance
            new THREE.Vector3(150, 0, 70),      // Turn 1 Apex
            new THREE.Vector3(150, 0, -70),     // Turn 2 Apex
            new THREE.Vector3(90, 0, -120),     // Backstretch Straight
            new THREE.Vector3(-90, 0, -120),    // Turn 3 Entrance
            new THREE.Vector3(-150, 0, -70),    // Turn 3 Apex
            new THREE.Vector3(-150, 0, 70),     // Turn 4 Apex
            new THREE.Vector3(-90, 0, 120)      // Frontstretch Straightaway
        ];
        const trackWidth = 32;
        let trackCurve;

        let scene, camera, renderer, clock;
        let playerCar, aiCars = [];
        let obstacles = [];
        let raceStarted = false;
        let raceFinished = false;
        let finalPlayerRank = "--";
        
        const activeInputs = { Forward: false, Backward: false, Left: false, Right: false };

        function startRaceSimulation(chosenColor) {
            document.getElementById('menu-overlay').style.display = 'none';
            init(chosenColor);
            triggerCountdown();
        }

        function init(playerColor) {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02020c);
            scene.fog = new THREE.FogExp2(0x02020c, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x1a223f, 0.9);
            scene.add(ambient);

            trackCurve = new THREE.CatmullRomCurve3(trackWaypoints, true);

            buildSceneryAndTrack();
            spawnCustomRaceCars(playerColor);

            window.addEventListener('keydown', (e) => toggleControls(e, true));
            window.addEventListener('keyup', (e) => toggleControls(e, false));
            window.addEventListener('resize', handleWindowResize);

            animate();
        }

        function buildSceneryAndTrack() {
            // Starfield Space
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<350; i++) {
                starCoords.push((Math.random()-0.5)*900, Math.random()*250+40, (Math.random()-0.5)*900);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 })));

            // Circuit Asphalt Surface Plane
            const trackGeo = new THREE.TubeGeometry(trackCurve, 200, trackWidth / 2, 8, true);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x1c1e24, roughness: 0.85, emissive: 0x040612 });
            const trackMesh = new THREE.Mesh(trackGeo, trackMat);
            trackMesh.scale.set(1, 0.002, 1); 
            scene.add(trackMesh);

            // FIXED: Checkered Finish Line Strip horizontally cutting exactly across the Z=120 straightaway
            const checkeredGroup = new THREE.Group();
            const sizeX = 1.2, sizeZ = 2.0;
            for(let i = 0; i < 3; i++) {       // Narrow depth down X-axis
                for(let j = 0; j < 16; j++) {  // Wide span across Z-axis
                    const boxGeo = new THREE.PlaneGeometry(sizeX, sizeZ);
                    const isWhite = (i + j) % 2 === 0;
                    const mat = new THREE.MeshBasicMaterial({ color: isWhite ? 0xffffff : 0x010101, side: THREE.DoubleSide });
                    const tile = new THREE.Mesh(boxGeo, mat);
                    tile.rotation.x = Math.PI / 2;
                    tile.position.set(0 + (i * sizeX), 0.05, 105.0 + (j * sizeZ)); // Centers on Z=120
                    checkeredGroup.add(tile);
                }
            }
            scene.add(checkeredGroup);

            // HIGH-INTENSITY STREET POLES
            const poleGeo = new THREE.CylinderGeometry(0.18, 0.25, 11);
            const armGeo = new THREE.CylinderGeometry(0.12, 0.12, 4);
            armGeo.rotateZ(Math.PI / 2);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x2d3748 });
            const lightGlowMat = new THREE.MeshBasicMaterial({ color: 0xfff3cc });

            for (let i = 0; i < 18; i++) {
                const t = i / 18;
                const trackPt = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const polePos = trackPt.clone().addScaledVector(normal, (trackWidth / 2) + 3);
                polePos.y = 0;

                const streetLight = new THREE.Group();
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.y = 5.5;
                
                const arm = new THREE.Mesh(armGeo, poleMat);
                arm.position.set(-2, 11, 0);

                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), lightGlowMat);
                bulb.position.set(-4, 10.8, 0);

                const spot = new THREE.SpotLight(0xfff6cc, 9.0, 60, Math.PI / 3, 0.6, 0.8);
                spot.position.set(-4, 10.8, 0);
                spot.target.position.copy(trackPt);
                scene.add(spot.target);

                streetLight.add(pole, arm, bulb, spot);
                streetLight.position.copy(polePos);
                streetLight.lookAt(trackPt); 
                scene.add(streetLight);
            }

            buildTrackObstacles();
        }

        function buildTrackObstacles() {
            const placements = [0.2, 0.45, 0.7, 0.85];
            
            placements.forEach((t, index) => {
                const pos = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const sideShift = (index % 2 === 0) ? -5 : 5;
                pos.addScaledVector(normal, sideShift);
                pos.y = 0;

                if (index % 2 === 0) {
                    const rampGroup = new THREE.Group();
                    const rampGeo = new THREE.BoxGeometry(6, 1.4, 6);
                    const posAttr = rampGeo.attributes.position;
                    for(let i=0; i<posAttr.count; i++) {
                        // FIXED: Re-slanted wedge to face exactly oncoming traffic cleanly
                        if(posAttr.getZ(i) > 0) posAttr.setY(i, posAttr.getY(i) - 0.7);
                    }
                    rampGeo.computeVertexNormals();

                    const rampMesh = new THREE.Mesh(rampGeo, new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x003322 }));
                    rampMesh.position.y = 0.7;
                    rampGroup.add(rampMesh);
                    rampGroup.position.copy(pos);
                    // Flips exactly 180 degrees to face correct traffic angle
                    rampGroup.lookAt(pos.clone().sub(tangent));
                    scene.add(rampGroup);

                    obstacles.push({ type: 'ramp', position: pos.clone(), radius: 4.5 });
                } else {
                    const holeGeo = new THREE.CylinderGeometry(3.5, 3.5, 0.1, 16);
                    const holeMesh = new THREE.Mesh(holeGeo, new THREE.MeshBasicMaterial({ color: 0xff3300, wireframe: true }));
                    holeMesh.position.copy(pos);
                    scene.add(holeMesh);

                    obstacles.push({ type: 'pothole', position: pos.clone(), radius: 4.0 });
                }
            });
        }

        // --- CORE VEHICLE PHYSICS ---
        class CustomRaceCar {
            constructor(color, isAI = false, label = "") {
                this.isAI = isAI;
                this.label = label;
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.heading = 0;
                this.speed = 0;
                this.lapProgress = 0;
                this.lapsCompleted = 0; // Total distance tracker for perfect Leaderboard sorting

                // FIXED: Bulletproof Directional Forward Checkpoint Anti-Cheat System
                this.hasHitCheckpoint25 = false;
                this.hasHitCheckpoint50 = false;
                this.hasHitCheckpoint75 = false;

                this.posY = 0.4;
                this.velY = 0;
                this.isGrounded = true;

                this.acceleration = 26.0;
                this.drag = 0.92;
                this.braking = 36.0;
                this.steeringSensitivity = 3.4; 
                this.maxSpeed = isAI ? 35.0 + (Math.random() * 4) : 48.0;

                this.mesh = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2 });
                const trimMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.6 });

                const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 5.2), bodyMat);
                body.position.y = 0.25;
                const spoiler = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.15, 0.8), trimMat);
                spoiler.position.set(0, 1.4, -2.4);
                this.mesh.add(body, spoiler);

                const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.7, 12).rotateZ(Math.PI / 2);
                const offsets = [[-1.35, 0.35, 1.7], [1.35, 0.35, 1.7], [-1.35, 0.35, -1.7], [1.35, 0.35, -1.7]];
                offsets.forEach(o => {
                    const w = new THREE.Mesh(wheelGeo, trimMat);
                    w.position.set(o[0], o[1], o[2]);
                    this.mesh.add(w);
                });

                scene.add(this.mesh);
            }

            updateVehiclePhysics(dt, controls) {
                if (controls.steer !== 0) {
                    this.heading += controls.steer * this.steeringSensitivity * dt;
                }

                if (controls.gas > 0) {
                    this.speed += this.acceleration * controls.gas * dt;
                } else if (controls.brake > 0) {
                    this.speed -= this.braking * controls.brake * dt;
                } else {
                    this.speed *= Math.pow(this.drag, dt * 10);
                }

                this.speed = THREE.MathUtils.clamp(this.speed, -8.0, this.maxSpeed);
                this.velocity.set(Math.sin(this.heading) * this.speed, 0, Math.cos(this.heading) * this.speed);
                const nextPos = this.position.clone().addScaledVector(this.velocity, dt);

                if (this.checkCircuitContainment(nextPos)) {
                    this.position.copy(nextPos);
                } else {
                    this.speed *= -0.4; 
                    this.heading += Math.PI * 0.05 * (controls.steer >= 0 ? -1 : 1); 
                    this.position.addScaledVector(this.velocity, -dt * 0.5);
                }

                if (!this.isGrounded) {
                    this.velY -= 22.0 * dt; 
                    this.posY += this.velY * dt;
                    if (this.posY <= 0.4) {
                        this.posY = 0.4;
                        this.velY = 0;
                        this.isGrounded = true;
                    }
                }

                this.mesh.position.copy(this.position);
                this.mesh.position.y = this.posY;
                this.mesh.rotation.y = this.heading;

                this.calculateLapProgress();

                this.evaluateObstacleIntersections();
                this.verifyCheckpointSecurityMetrics(); // Apply logic uniformly so AI doesn't break
            }

            checkCircuitContainment(provisionalPos) {
                let shortestDistSq = Infinity;
                for (let i = 0; i < trackWaypoints.length; i++) {
                    const next = (i + 1) % trackWaypoints.length;
                    const p1 = trackWaypoints[i];
                    const p2 = trackWaypoints[next];

                    const ab = p2.clone().sub(p1);
                    const ap = provisionalPos.clone().sub(p1);
                    const factor = THREE.MathUtils.clamp(ap.dot(ab) / ab.lengthSq(), 0, 1);
                    const closest = p1.clone().add(ab.multiplyScalar(factor));
                    
                    const distSq = provisionalPos.distanceToSquared(closest);
                    if (distSq < shortestDistSq) shortestDistSq = distSq;
                }
                return shortestDistSq <= (trackWidth * trackWidth) / 3.8;
            }

            evaluateObstacleIntersections() {
                obstacles.forEach(obs => {
                    const flatCarPos = new THREE.Vector2(this.position.x, this.position.z);
                    const flatObsPos = new THREE.Vector2(obs.position.x, obs.position.z);
                    
                    if (flatCarPos.distanceTo(flatObsPos) < obs.radius) {
                        if (obs.type === 'ramp' && this.isGrounded) {
                            this.isGrounded = false;
                            this.velY = 12.0; 
                            this.speed += 6.0; 
                        } else if (obs.type === 'pothole' && this.isGrounded) {
                            this.speed *= 0.45;
                        }
                    }
                });
            }

            verifyCheckpointSecurityMetrics() {
                // Mandatory forward sequential progression checkpoints
                if (this.lapProgress > 0.23 && this.lapProgress < 0.35) this.hasHitCheckpoint25 = true;
                if (this.lapProgress > 0.48 && this.lapProgress < 0.60 && this.hasHitCheckpoint25) this.hasHitCheckpoint50 = true;
                if (this.lapProgress > 0.73 && this.lapProgress < 0.85 && this.hasHitCheckpoint50) this.hasHitCheckpoint75 = true;

                // Detect official successful forward finish
                if (this.lapProgress > 0.94 && this.lapProgress < 0.99 && this.hasHitCheckpoint75) {
                    this.lapsCompleted += 1;
                    this.hasHitCheckpoint25 = false; 
                    this.hasHitCheckpoint50 = false;
                    this.hasHitCheckpoint75 = false;
                    
                    if (!this.isAI && !raceFinished) {
                        triggerRaceVictoryEvent();
                    }
                }
            }

            calculateLapProgress() {
                let nearestT = 0;
                let minDist = Infinity;
                const scans = 150;
                for (let i = 0; i <= scans; i++) {
                    const testT = i / scans;
                    const trackPt = trackCurve.getPointAt(testT);
                    const d = this.position.distanceToSquared(trackPt);
                    if (d < minDist) {
                        minDist = d;
                        nearestT = testT;
                    }
                }
                this.lapProgress = nearestT;
            }
        }

        function spawnCustomRaceCars(playerColor) {
            playerCar = new CustomRaceCar(playerColor, false, "Player");
            playerCar.position.set(0, 0.4, 120); 
            playerCar.heading = Math.PI / 2; // Facing exactly +X direction

            const aiColors = [0xe28743, 0x8e44ad, 0x00ffff, 0xffaa00];
            for (let i = 0; i < 4; i++) {
                const ai = new CustomRaceCar(aiColors[i], true, `AI_${i+1}`);
                // FIXED: Spawn completely on the track (X axis negative, Z strictly 120 baseline)
                ai.position.set(-15 - (i * 12), 0.4, 120 + (i % 2 === 0 ? 6 : -6));
                ai.heading = Math.PI / 2;
                aiCars.push(ai);
            }
        }

        function triggerCountdown() {
            const box = document.getElementById('countdown-box');
            box.style.display = 'block';
            let timerVal = 3;
            
            const interval = setInterval(() => {
                timerVal--;
                if(timerVal === 0) {
                    box.innerText = "GO!";
                    box.style.color = "#64ffda";
                    raceStarted = true;
                } else if (timerVal < 0) {
                    clearInterval(interval);
                    box.style.display = 'none';
                } else {
                    box.innerText = timerVal;
                }
            }, 1000);
        }

        function toggleControls(e, isPressed) {
            switch(e.key) {
                case 'w': case 'W': case 'ArrowUp': activeInputs.Forward = isPressed; break;
                case 's': case 'S': case 'ArrowDown': activeInputs.Backward = isPressed; break;
                case 'a': case 'A': case 'ArrowLeft': activeInputs.Left = isPressed; break;
                case 'd': case 'D': case 'ArrowRight': activeInputs.Right = isPressed; break;
            }
        }

        // --- FIXED SMART CARROT-ON-A-STICK FORWARD AI ---
        function runAIAutonomousLogic(car, dt) {
            // Find exactly where the car is, and project target physically 3% ahead on the curve
            let lookaheadT = car.lapProgress + 0.03; 
            if (lookaheadT > 1.0) lookaheadT -= 1.0;

            const target = trackCurve.getPointAt(lookaheadT);

            const desiredAngle = Math.atan2(target.x - car.position.x, target.z - car.position.z);
            let angularErr = desiredAngle - car.heading;

            while (angularErr < -Math.PI) angularErr += Math.PI * 2;
            while (angularErr > Math.PI) angularErr -= Math.PI * 2;

            let steerVal = 0;
            if (Math.abs(angularErr) > 0.05) steerVal = angularErr > 0 ? 1 : -1;
            const curveDampener = Math.abs(angularErr) > 0.35 ? 0.6 : 1.0;

            car.updateVehiclePhysics(dt, { gas: curveDampener, brake: 0, steer: steerVal });
        }

        function computeLeaderboardPositions() {
            if(!playerCar) return;
            let pack = [playerCar, ...aiCars];
            
            // FIXED: Sort by total accumulated race distance to prevent position jumping on line-crosses
            pack.sort((a, b) => (b.lapsCompleted + b.lapProgress) - (a.lapsCompleted + a.lapProgress));
            
            const rank = pack.findIndex(c => c.label === "Player") + 1;
            const suffix = ["ST", "ND", "RD", "TH", "TH"][rank - 1];
            const displayRank = rank + suffix;
            
            if(!raceFinished) {
                document.getElementById('place-display').innerText = displayRank;
                document.getElementById('pos-out').innerText = Math.floor(playerCar.lapProgress * 100) + "%";
                finalPlayerRank = displayRank;
            }
        }

        function triggerRaceVictoryEvent() {
            raceFinished = true;
            raceStarted = false;
            
            document.getElementById('victory-place').innerText = `FINAL STANDING: ${finalPlayerRank} PLACE`;
            document.getElementById('victory-screen').style.display = 'flex';
            document.getElementById('confetti-canvas').style.display = 'block';
            
            initConfettiScript();
        }

        let confettiPieces = [];
        function initConfettiScript() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for(let i=0; i<120; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: `hsl(${Math.random()*360}, 100%, 60%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function drawConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiPieces.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    if (p.y > canvas.height) {
                        confettiPieces[index] = p;
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(drawConfettiFrame);
            }
            drawConfettiFrame();
        }

        function handleWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);

            const playerCommands = {
                gas: activeInputs.Forward ? 1.0 : 0.0,
                brake: activeInputs.Backward ? 1.0 : 0.0,
                steer: (activeInputs.Left ? 1.0 : 0.0) - (activeInputs.Right ? 1.0 : 0.0)
            };

            if (raceStarted && !raceFinished) {
                playerCar.updateVehiclePhysics(dt, playerCommands);
                aiCars.forEach(ai => ai.updateVehiclePhysics(dt, { gas: 0, brake: 0, steer: 0 })); 
                aiCars.forEach(ai => runAIAutonomousLogic(ai, dt));
                computeLeaderboardPositions();
            }

            if (playerCar) {
                const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
                const targetCamPos = playerCar.position.clone().add(cameraOffset);
                camera.position.lerp(targetCamPos, 0.12);
                camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

                document.getElementById('speed-out').innerText = playerCar.speed.toFixed(2);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
