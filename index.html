<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vector Racing & AI Pathfinding Simulator</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #05050a; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #dashboard { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(10, 25, 47, 0.85); color: #64ffda; padding: 15px 25px; border-radius: 8px; border: 1px solid #172a45; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px); pointer-events: none; }
        #dashboard h2 { margin: 0 0 5px 0; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .stat { font-size: 1.1em; font-family: monospace; margin: 3px 0; }
        #instructions { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.05); color: #ccd6f6; padding: 10px 20px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(3px); font-size: 0.9em; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="instructions">
        <strong>Controls:</strong> Use <b>W, A, S, D</b> or <b>Arrow Keys</b> to steer/accelerate.
    </div>

    <div id="dashboard">
        <h2>Telemetry Metrics</h2>
        <div class="stat">Player Speed: <span id="speed-out">0.00</span> m/s</div>
        <div class="stat">Position: <span id="pos-out">(0.0, 0.0)</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- SYSTEM 1: ENVIRONMENT & TRACK BOUNDARIES STRUCT ---
        // Define track configuration vectors (a loop layout)
        const trackWaypoints = [
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(120, 0, 40),
            new THREE.Vector3(200, 0, 150),
            new THREE.Vector3(140, 0, 260),
            new THREE.Vector3(0, 0, 300),
            new THREE.Vector3(-140, 0, 240),
            new THREE.Vector3(-200, 0, 100),
            new THREE.Vector3(-100, 0, -20)
        ];
        const trackWidth = 24;

        // --- GLOBAL SCENE CONFIGURATION ---
        let scene, camera, renderer, clock;
        let playerCar, aiCars = [];
        const keys = { w: false, a: false, s: false, d: false };

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a192f);
            scene.fog = new THREE.FogExp2(0x0a192f, 0.0025);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting architecture
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(100, 150, 50);
            dirLight.castShadow = true;
            scene.add(dirLight);

            buildTrackEnvironment();
            spawnVehicles();

            // Set input event handlers
            window.addEventListener('keydown', (e) => handleKey(e, true));
            window.addEventListener('keyup', (e) => handleKey(e, false));
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function buildTrackEnvironment() {
            // Generate ground grid plane
            const floorGeo = new THREE.PlaneGeometry(1000, 1000);
            const floorMat = new THREE.MeshStandardMaterial({ color: #112240, roughness: 0.9 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Construct visual track geometry using a continuous CatmullRom curve
            const curve = new THREE.CatmullRomCurve3(trackWaypoints, true);
            const points = curve.getPoints(200);
            
            const trackGeo = new THREE.TubeGeometry(curve, 200, trackWidth / 2, 8, true);
            const trackMat = new THREE.MeshStandardMaterial({ color: #233554, roughness: 0.7, wireframe: false });
            const trackMesh = new THREE.Mesh(trackGeo, trackMat);
            trackMesh.scale.set(1, 0.01, 1); // Flatten tube into flat track strip
            trackMesh.position.y = 0.05;
            scene.add(trackMesh);

            // Add center dividing layout line
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: #64ffda });
            const centerLine = new THREE.Line(lineGeo, lineMat);
            centerLine.position.y = 0.1;
            scene.add(centerLine);
        }

        // --- SYSTEM 2: VECTOR PHYSICS RIG ---
        class CarEntity {
            constructor(color, isAI = false) {
                this.isAI = isAI;
                
                // Physics metrics initialization
                this.position = new THREE.Vector3(0, 0.5, 0);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.heading = 0; // Direction angle in radians
                this.speed = 0;
                
                // Dynamic limits parameters
                this.acceleration = 18.0; 
                this.drag = 0.95;
                this.braking = 25.0;
                this.steeringSensitivity = 2.4;
                this.maxSpeed = isAI ? 38.0 : 45.0; // Give player slight edge

                // AI Pathfinding target states
                this.currentWaypointIndex = 0;

                // Build 3D structural model wire meshes
                const bodyGeo = new THREE.BoxGeometry(2.2, 1, 4.5);
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
                this.mesh = new THREE.Mesh(bodyGeo, bodyMat);
                this.mesh.castShadow = true;
                
                // Simple cockpit design block overlay
                const cabinGeo = new THREE.BoxGeometry(1.6, 0.6, 2.0);
                const cabinMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1 });
                const cabin = new THREE.Mesh(cabinGeo, cabinMat);
                cabin.position.set(0, 0.7, -0.3);
                this.mesh.add(cabin);

                scene.add(this.mesh);
            }

            updatePhysics(dt, controls) {
                // Steer logic angular momentum
                if (controls.steer !== 0) {
                    // Turn radius dependent on asset forward velocity scale
                    const turnFactor = Math.min(this.speed / 10.0, 1.0);
                    this.heading += controls.steer * this.steeringSensitivity * turnFactor * dt;
                }

                // Gas/Brake directional forces vector resolution
                if (controls.gas > 0) {
                    this.speed += this.acceleration * controls.gas * dt;
                } else if (controls.brake > 0) {
                    this.speed -= this.braking * controls.brake * dt;
                } else {
                    // Standard drag decay application
                    this.speed *= Math.pow(this.drag, dt * 10);
                }

                // Velocity containment ceiling caps
                this.speed = THREE.MathUtils.clamp(this.speed, -10.0, this.maxSpeed);

                // Update 2D Cartesian plane translation coordinates
                this.velocity.set(
                    Math.sin(this.heading) * this.speed,
                    0,
                    Math.cos(this.heading) * this.speed
                );

                // Boundary containment verification checks
                const provisionalPosition = this.position.clone().addScaledVector(this.velocity, dt);
                if (this.verifyTrackContainment(provisionalPosition)) {
                    this.position.copy(provisionalPosition);
                } else {
                    // Wall collision response momentum dump vector reaction
                    this.speed *= -0.4; 
                    this.position.addScaledVector(this.velocity, -dt * 0.5);
                }

                // Push position and orientation frames to 3D matrix objects
                this.mesh.position.copy(this.position);
                this.mesh.rotation.y = this.heading;
            }

            verifyTrackContainment(provisionalPos) {
                // Find shortest distance vector between car and center loop track spline
                let minDistanceSq = Infinity;
                
                // Iterate spatial sub-segments to check bounds constraints
                for (let i = 0; i < trackWaypoints.length; i++) {
                    const nextIndex = (i + 1) % trackWaypoints.length;
                    const p1 = trackWaypoints[i];
                    const p2 = trackWaypoints[nextIndex];

                    // Project point onto line segment matrix calculations
                    const ab = p2.clone().sub(p1);
                    const ap = provisionalPos.clone().sub(p1);
                    const factor = THREE.MathUtils.clamp(ap.dot(ab) / ab.lengthSq(), 0, 1);
                    const closestPoint = p1.clone().add(ab.multiplyScalar(factor));
                    
                    const distSq = provisionalPos.distanceToSquared(closestPoint);
                    if (distSq < minDistanceSq) {
                        minDistanceSq = distSq;
                    }
                }
                // Return flag verifying if car is inside acceptable width boundary parameters
                return minDistanceSq <= (trackWidth * trackWidth) / 3.6;
            }
        }

        // --- SYSTEM 3: AI PATHFINDING ENGINE ---
        function executeAIProcessing(car, dt) {
            let target = trackWaypoints[car.currentWaypointIndex];
            
            // If car reaches close proximity vector to target waypoint, shift to tracking next node array index
            if (car.position.distanceTo(target) < 25) {
                car.currentWaypointIndex = (car.currentWaypointIndex + 1) % trackWaypoints.length;
                target = trackWaypoints[car.currentWaypointIndex];
            }

            // Vector math tracking trajectory orientation calculation delta parameters
            const desiredHeading = Math.atan2(target.x - car.position.x, target.z - car.position.z);
            let headingError = desiredHeading - car.heading;

            // Balance radian wrap boundaries (-PI to +PI tracking configurations)
            while (headingError < -Math.PI) headingError += Math.PI * 2;
            while (headingError > Math.PI) headingError -= Math.PI * 2;

            // Generate control parameters
            let steerCommand = 0;
            if (Math.abs(headingError) > 0.05) {
                steerCommand = headingError > 0 ? 1 : -1;
            }

            // Dynamically scale down speed parameters when rounding sharp turns
            const throttleCurve = Math.abs(headingError) > 0.4 ? 0.4 : 1.0;

            car.updatePhysics(dt, {
                gas: throttleCurve,
                brake: 0,
                steer: steerCommand
            });
        }

        function spawnVehicles() {
            // Player car assembly placement instantiations
            playerCar = new CarEntity(0xe53e3e, false);
            playerCar.position.set(0, 0.5, 10);
            playerCar.heading = Math.PI / 2;

            // Spawn AI grid cars array configurations
            const aiColors = [0x3182ce, 0x38a169, 0xd69e2e];
            for (let i = 0; i < 3; i++) {
                const ai = new CarEntity(aiColors[i], true);
                ai.position.set((i + 1) * -6, 0.5, 0 - (i * 4));
                ai.heading = Math.PI / 2;
                ai.currentWaypointIndex = 1;
                aiCars.push(ai);
            }
        }

        function handleKey(event, isPressed) {
            switch(event.code) {
                case 'KeyW': case 'ArrowUp': keys.w = isPressed; break;
                case 'KeyA': case 'ArrowLeft': keys.a = isPressed; break;
                case 'KeyS': case 'ArrowDown': keys.s = isPressed; break;
                case 'KeyD': case 'ArrowRight': keys.d = isPressed; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- CORE RUNTIME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Clamp maximum framerate delta time leaks

            // Standard Keyboard control logic mapping configurations for human player interaction
            const playerInputs = {
                gas: keys.w ? 1.0 : 0.0,
                brake: keys.s ? 1.0 : 0.0,
                steer: (keys.a ? 1.0 : 0.0) - (keys.d ? 1.0 : 0.0)
            };

            // Drive physics engines execution loop layers
            playerCar.updatePhysics(dt, playerInputs);
            aiCars.forEach(ai => executeAIProcessing(ai, dt));

            // Third-person camera trailing vector chasing logic setup
            const targetCamOffset = new THREE.Vector3(
                -Math.sin(playerCar.heading) * 18,
                8,
                -Math.cos(playerCar.heading) * 18
            );
            const idealCameraPosition = playerCar.position.clone().add(targetCamOffset);
            camera.position.lerp(idealCameraPosition, 0.1); // Smooth linear structural camera interpolations
            camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 1, 4)));

            // Inject telemetry outputs to DOM dashboard elements panels
            document.getElementById('speed-out').innerText = playerCar.speed.toFixed(2);
            document.getElementById('pos-out').innerText = `(${playerCar.position.x.toFixed(1)}, ${playerCar.position.z.toFixed(1)})`;

            renderer.render(scene, camera);
        }

        // Start initialization configuration cycle
        window.onload = init;
    </script>
</body>
</html>
