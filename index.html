<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Circuit - Pro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Rajdhani:wght@500;700&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background-color: #020208; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        /* Sleek, Modern AAA Racing Menu */
        #menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle at bottom right, #111a2e 0%, #05070a 100%);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }
        .title-racer { 
            font-family: 'Teko', sans-serif; font-size: 7em; margin: 0; color: #ffffff; 
            text-transform: uppercase; font-weight: 700; letter-spacing: 6px; line-height: 1;
            text-shadow: 0px 0px 20px rgba(100,255,218,0.4);
        }
        .subtitle { color: #64ffda; margin: 5px 0 35px 0; font-size: 1.4em; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        
        .profile-setup { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.03); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; backdrop-filter: blur(10px); }
        .name-input { 
            background: rgba(0,0,0,0.6); border: 2px solid #3182ce; color: #fff; border-radius: 6px;
            padding: 12px 20px; font-size: 1.5em; font-family: 'Rajdhani', sans-serif; font-weight: 700;
            text-align: center; outline: none; width: 350px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .name-input:focus { border-color: #64ffda; box-shadow: 0 0 15px rgba(100,255,218,0.3); }
        .name-input::placeholder { color: #4a5568; }

        .btn-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .color-btn { 
            padding: 12px 25px; border: 2px solid transparent; border-radius: 6px; font-weight: 700; 
            cursor: pointer; font-size: 1.2em; transition: 0.3s; text-transform: uppercase; 
            letter-spacing: 1px; font-family: 'Rajdhani', sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .color-btn:hover { transform: translateY(-3px); border-color: #fff; box-shadow: 0 8px 20px rgba(255,255,255,0.2); }
        
        #countdown-box { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 12em; font-weight: 700; color: #fff; z-index: 50; pointer-events: none; text-shadow: 0 0 40px #ff0055, 0 0 10px #ff0055; display: none; font-family: 'Teko', sans-serif; }
        
        #leaderboard { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(5, 7, 12, 0.85); color: #fff; padding: 15px 30px; border-radius: 8px; border-left: 4px solid #64ffda; backdrop-filter: blur(5px); }
        #place-display { font-size: 3.5em; font-weight: 700; color: #64ffda; text-align: center; margin-top: -10px; font-family: 'Teko', sans-serif; }
        
        #dashboard { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(5, 7, 12, 0.85); color: #fff; padding: 15px 30px; border-radius: 8px; border-left: 4px solid #3182ce; font-family: 'Teko', sans-serif; pointer-events: none; backdrop-filter: blur(5px); }
        .stat { font-size: 2em; margin: 0; font-weight: 500; line-height: 1.2; letter-spacing: 1px; }

        /* Victory Overlay & Post-Race Leaderboard */
        #victory-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2, 4, 8, 0.9); z-index: 90; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(8px); }
        #victory-card { background: #0a0f1a; border: 2px solid #3182ce; padding: 40px 60px; border-radius: 12px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); min-width: 500px; }
        #victory-card h2 { font-family: 'Teko', sans-serif; font-size: 5em; margin: 0; color: #64ffda; text-transform: uppercase; text-shadow: 0 0 20px rgba(100,255,218,0.3); font-weight: 700; line-height: 1; }
        #victory-place { font-family: 'Rajdhani', sans-serif; font-size: 1.5em; margin: 5px 0 20px 0; color: #a8b2d1; font-weight: 500; letter-spacing: 2px; }
        
        #final-leaderboard-container { width: 100%; margin-bottom: 25px; }
        .lb-row { display: flex; justify-content: space-between; padding: 10px 20px; background: rgba(255,255,255,0.05); margin-bottom: 6px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 1.4em; font-weight: 700; align-items: center; }
        .lb-row.player-row { background: rgba(100,255,218,0.15); border: 1px solid rgba(100,255,218,0.4); }
        .lb-rank { width: 40px; color: #8892b0; text-align: left; }
        .lb-name { flex-grow: 1; text-align: left; margin-left: 15px; letter-spacing: 1px; }
        .lb-score { color: #fff; }

        .restart-btn { font-family: 'Rajdhani', sans-serif; background: #3182ce; color: #fff; border: none; border-radius: 6px; padding: 12px 40px; font-weight: 700; cursor: pointer; font-size: 1.3em; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px; }
        .restart-btn:hover { background: #64ffda; color: #000; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(100,255,218,0.4); }
        
        #confetti-canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 95; pointer-events: none; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <h1 class="title-racer">MIDNIGHT CIRCUIT</h1>
        <p class="subtitle">Official Pro Series Qualifier</p>
        
        <div class="profile-setup">
            <input type="text" id="racer-name" class="name-input" placeholder="ENTER DRIVER NAME" maxlength="14" autocomplete="off">
            <div style="color: #8892b0; font-size: 1.1em; font-weight: 500; margin-bottom: 15px;">SELECT TEAM LIVERY TO ENTER GRID</div>
            <div class="btn-grid">
                <button class="color-btn" style="background: #e53e3e; color: white;" onclick="startRaceSimulation(0xe53e3e)">Formula Red</button>
                <button class="color-btn" style="background: #ffaa00; color: #000;" onclick="startRaceSimulation(0xffaa00)">Liquid Gold</button>
                <button class="color-btn" style="background: #0055ff; color: white;" onclick="startRaceSimulation(0x0055ff)">Cobalt Blue</button>
                <button class="color-btn" style="background: #00ff66; color: black;" onclick="startRaceSimulation(0x00ff66)">Neon Viper</button>
                <button class="color-btn" style="background: #ff007f; color: white;" onclick="startRaceSimulation(0xff007f)">Cyber Pink</button>
            </div>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="victory-screen">
        <div id="victory-card">
            <h2>CONGRATULATIONS!</h2>
            <div id="victory-place">OFFICIAL RACE RESULTS</div>
            <div id="final-leaderboard-container"></div>
            <button class="restart-btn" onclick="window.location.reload()">Race Again</button>
        </div>
    </div>

    <div id="countdown-box">3</div>

    <div id="leaderboard">
        <div style="font-size: 1.3em; text-transform: uppercase; font-family: 'Teko', sans-serif;">Position</div>
        <div id="place-display">--</div>
    </div>

    <div id="dashboard">
        <div class="stat">SPEED: <span id="speed-out">0</span> MPH</div>
        <div class="stat">LAP: <span id="pos-out">1 / 1</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- MASSIVE COMPLEX TRACK (Left, Right, S-Curves, Hairpins) ---
        const trackWaypoints = [
            new THREE.Vector3(0, 0, 0),         // Start / Finish Line
            new THREE.Vector3(0, 0, -300),      // Fast Front Straight
            new THREE.Vector3(150, 0, -450),    // Sweeping Right
            new THREE.Vector3(400, 0, -500),    // Hard Right
            new THREE.Vector3(500, 0, -300),    // Short Straight
            new THREE.Vector3(400, 0, -100),    // Left Hairpin curve
            new THREE.Vector3(200, 0, 0),       // Right Chicane entry
            new THREE.Vector3(100, 0, 150),     // Left Chicane exit
            new THREE.Vector3(300, 0, 350),     // Deep Right Sweeper
            new THREE.Vector3(0, 0, 500),       // Deep Left Sweeper
            new THREE.Vector3(-200, 0, 400),    // Hard Left
            new THREE.Vector3(-300, 0, 200),    // Short Straight Back
            new THREE.Vector3(-100, 0, 100)     // Final Right leading to Start
        ];
        const trackWidth = 36;
        let trackCurve;
        let physicsCurvePoints = []; 

        let scene, camera, renderer, clock;
        let playerCar, aiCars = [];
        let obstacles = [];
        let raceStarted = false;
        let raceFinished = false;
        let finalPlayerRank = "--";
        let playerNameStr = "PLAYER";
        
        const activeInputs = { Forward: false, Backward: false, Left: false, Right: false };

        // Pre-defined AI Rivals
        const aiRivals = [
            { color: 0xffaa00, name: "IGNITE" },
            { color: 0x8e44ad, name: "PHANTOM" },
            { color: 0x00ffff, name: "FROST" },
            { color: 0x99ff00, name: "VENOM" },
            { color: 0xff0055, name: "APEX" }
        ];

        function startRaceSimulation(chosenColor) {
            const inputName = document.getElementById('racer-name').value.trim().toUpperCase();
            if(inputName !== "") playerNameStr = inputName;
            
            document.getElementById('menu-overlay').style.display = 'none';
            init(chosenColor);
            triggerCountdown();
        }

        function init(playerColor) {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x02020a);
            scene.fog = new THREE.FogExp2(0x02020a, 0.0015); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x223355, 0.9);
            scene.add(ambient);

            trackCurve = new THREE.CatmullRomCurve3(trackWaypoints, true);
            physicsCurvePoints = trackCurve.getPoints(600);

            buildSceneryAndTrack();
            spawnCustomRaceCars(playerColor);

            window.addEventListener('keydown', (e) => toggleControls(e, true));
            window.addEventListener('keyup', (e) => toggleControls(e, false));
            window.addEventListener('resize', handleWindowResize);

            // INSTANT CAMERA LOCK
            const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
            camera.position.copy(playerCar.position.clone().add(cameraOffset));
            camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

            animate();
        }

        function buildSceneryAndTrack() {
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<800; i++) {
                starCoords.push((Math.random()-0.5)*2000, Math.random()*400+50, (Math.random()-0.5)*2000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.0 })));

            // Asphalt Track
            const trackGeo = new THREE.TubeGeometry(trackCurve, 500, trackWidth / 2, 8, true);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x151822, roughness: 0.9, emissive: 0x02030a });
            const trackMesh = new THREE.Mesh(trackGeo, trackMat);
            trackMesh.scale.set(1, 0.002, 1); 
            scene.add(trackMesh);

            // --- PERFECTLY BLENDED CANVAS FINISH LINE ---
            const flCanvas = document.createElement('canvas');
            flCanvas.width = 1024;
            flCanvas.height = 256;
            const ctx = flCanvas.getContext('2d');

            // Draw Checkers in the middle
            for(let i=0; i<32; i++) {
                for(let j=0; j<8; j++) {
                    ctx.fillStyle = (i+j)%2 === 0 ? '#ffffff' : '#050505';
                    ctx.fillRect(i*32, j*32, 32, 32);
                }
            }

            // Radial gradient fades on left and right edges to blend perfectly into asphalt shadow
            const fadeLeft = ctx.createLinearGradient(0, 0, 250, 0);
            fadeLeft.addColorStop(0, '#151822');
            fadeLeft.addColorStop(1, 'rgba(21, 24, 34, 0)');
            ctx.fillStyle = fadeLeft;
            ctx.fillRect(0, 0, 250, 256);

            const fadeRight = ctx.createLinearGradient(774, 0, 1024, 0);
            fadeRight.addColorStop(0, 'rgba(21, 24, 34, 0)');
            fadeRight.addColorStop(1, '#151822');
            ctx.fillStyle = fadeRight;
            ctx.fillRect(774, 0, 250, 256);

            const flTex = new THREE.CanvasTexture(flCanvas);
            const flMat = new THREE.MeshBasicMaterial({ map: flTex, transparent: true });
            
            // Map exact dimension to fit across track width neatly
            const checkeredMesh = new THREE.Mesh(new THREE.PlaneGeometry(36, 9), flMat);
            
            const startPt = trackCurve.getPointAt(0);
            const startTangent = trackCurve.getTangentAt(0);
            const startAngle = Math.atan2(startTangent.x, startTangent.z);
            
            checkeredMesh.position.copy(startPt);
            checkeredMesh.position.y = 0.05; // Hover over asphalt
            checkeredMesh.rotation.x = -Math.PI / 2;
            checkeredMesh.rotation.z = -startAngle;
            scene.add(checkeredMesh);

            // HIGH-INTENSITY STREET LIGHTS
            const poleGeo = new THREE.CylinderGeometry(0.2, 0.3, 12);
            const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 5);
            armGeo.rotateZ(Math.PI / 2);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x222 });
            const lightGlowMat = new THREE.MeshBasicMaterial({ color: 0xffffee });

            for (let i = 0; i < 50; i++) {
                const t = i / 50;
                const trackPt = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const polePos = trackPt.clone().addScaledVector(normal, (trackWidth / 2) + 4);
                polePos.y = 0;

                const streetLight = new THREE.Group();
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.y = 6;
                const arm = new THREE.Mesh(armGeo, poleMat);
                arm.position.set(-2.5, 12, 0);
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 8), lightGlowMat);
                bulb.position.set(-5, 11.8, 0);

                const spot = new THREE.SpotLight(0xfff6cc, 12.0, 90, Math.PI / 2.5, 0.5, 0.8);
                spot.position.set(-5, 11.8, 0);
                spot.target.position.copy(trackPt);
                scene.add(spot.target);

                streetLight.add(pole, arm, bulb, spot);
                streetLight.position.copy(polePos);
                streetLight.lookAt(trackPt); 
                scene.add(streetLight);
            }

            buildTrackObstacles();
        }

        function buildTrackObstacles() {
            const placements = [0.15, 0.35, 0.60, 0.85];
            
            placements.forEach((t, index) => {
                const pos = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const sideShift = (index % 2 === 0) ? -6 : 6;
                pos.addScaledVector(normal, sideShift);
                pos.y = 0;

                if (index % 2 === 0) {
                    const rampGroup = new THREE.Group();
                    const rampGeo = new THREE.BoxGeometry(7, 1.6, 7);
                    const posAttr = rampGeo.attributes.position;
                    for(let i=0; i<posAttr.count; i++) {
                        if(posAttr.getZ(i) > 0) posAttr.setY(i, posAttr.getY(i) - 0.8);
                    }
                    rampGeo.computeVertexNormals();

                    const rampMesh = new THREE.Mesh(rampGeo, new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x003322 }));
                    rampMesh.position.y = 0.8;
                    rampGroup.add(rampMesh);
                    rampGroup.position.copy(pos);
                    rampGroup.lookAt(pos.clone().sub(tangent));
                    scene.add(rampGroup);
                    obstacles.push({ type: 'ramp', position: pos.clone(), radius: 5.0 });
                } else {
                    const holeGeo = new THREE.CylinderGeometry(4.5, 4.5, 0.1, 16);
                    const holeMesh = new THREE.Mesh(holeGeo, new THREE.MeshBasicMaterial({ color: 0xff3300, wireframe: true }));
                    holeMesh.position.copy(pos);
                    scene.add(holeMesh);
                    obstacles.push({ type: 'pothole', position: pos.clone(), radius: 5.0 });
                }
            });
        }

        // --- CORE VEHICLE PHYSICS ---
        class CustomRaceCar {
            constructor(colorHex, isAI = false, label = "") {
                this.isAI = isAI;
                this.label = label;
                this.colorHex = colorHex; // Saved for UI Leaderboard colors
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.heading = 0;
                this.speed = 0;
                this.lapProgress = 0;
                this.lapsCompleted = 0; 

                this.aiOffset = isAI ? (Math.random() - 0.5) * 18 : 0; 
                this.aiAggression = Math.random();

                this.hasHitCheckpoint25 = false;
                this.hasHitCheckpoint50 = false;
                this.hasHitCheckpoint75 = false;

                this.posY = 0.4;
                this.velY = 0;
                this.isGrounded = true;

                this.acceleration = isAI ? 24.0 : 36.0; 
                this.drag = 0.92;
                this.braking = 45.0;
                this.steeringSensitivity = 3.6; 
                this.maxSpeed = isAI ? 55.0 + (Math.random() * 8) : 65.0; 

                this.mesh = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2 });
                const trimMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.8 });

                const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 5.2), bodyMat);
                body.position.y = 0.25;
                const spoiler = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.15, 0.8), trimMat);
                spoiler.position.set(0, 1.4, -2.4);
                this.mesh.add(body, spoiler);

                const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.7, 12).rotateZ(Math.PI / 2);
                const offsets = [[-1.35, 0.35, 1.7], [1.35, 0.35, 1.7], [-1.35, 0.35, -1.7], [1.35, 0.35, -1.7]];
                offsets.forEach(o => {
                    const w = new THREE.Mesh(wheelGeo, trimMat);
                    w.position.set(o[0], o[1], o[2]);
                    this.mesh.add(w);
                });

                scene.add(this.mesh);
            }

            updateVehiclePhysics(dt, controls) {
                if (!raceStarted && !raceFinished) return;

                if (controls.steer !== 0) {
                    this.heading += controls.steer * this.steeringSensitivity * dt;
                }

                if (controls.gas > 0) {
                    this.speed += this.acceleration * controls.gas * dt;
                } else if (controls.brake > 0) {
                    this.speed -= this.braking * controls.brake * dt;
                } else {
                    this.speed *= Math.pow(this.drag, dt * 10);
                }

                this.speed = THREE.MathUtils.clamp(this.speed, -8.0, this.maxSpeed);
                this.velocity.set(Math.sin(this.heading) * this.speed, 0, Math.cos(this.heading) * this.speed);
                const nextPos = this.position.clone().addScaledVector(this.velocity, dt);

                if (!this.isAI) {
                    if (this.checkCircuitContainment(nextPos)) {
                        this.position.copy(nextPos);
                    } else {
                        this.speed *= -0.5; 
                        this.heading += Math.PI * 0.05 * (controls.steer >= 0 ? -1 : 1); 
                        this.position.addScaledVector(this.velocity, -dt * 0.4);
                    }
                } else {
                    this.position.copy(nextPos);
                }

                if (!this.isGrounded) {
                    this.velY -= 22.0 * dt; 
                    this.posY += this.velY * dt;
                    if (this.posY <= 0.4) {
                        this.posY = 0.4;
                        this.velY = 0;
                        this.isGrounded = true;
                    }
                }

                this.mesh.position.copy(this.position);
                this.mesh.position.y = this.posY;
                this.mesh.rotation.y = this.heading;

                let prevProgress = this.lapProgress;
                this.calculateLapProgress();
                this.evaluateObstacleIntersections();
                this.verifyCheckpointSecurityMetrics(prevProgress);
            }

            checkCircuitContainment(provisionalPos) {
                let shortestDistSq = Infinity;
                for (let i = 0; i < physicsCurvePoints.length; i++) {
                    const distSq = provisionalPos.distanceToSquared(physicsCurvePoints[i]);
                    if (distSq < shortestDistSq) shortestDistSq = distSq;
                }
                return shortestDistSq <= ((trackWidth/2) * (trackWidth/2));
            }

            evaluateObstacleIntersections() {
                obstacles.forEach(obs => {
                    const flatCarPos = new THREE.Vector2(this.position.x, this.position.z);
                    const flatObsPos = new THREE.Vector2(obs.position.x, obs.position.z);
                    
                    if (flatCarPos.distanceTo(flatObsPos) < obs.radius) {
                        if (obs.type === 'ramp' && this.isGrounded) {
                            this.isGrounded = false;
                            this.velY = 13.0; 
                            this.speed += 8.0; 
                        } else if (obs.type === 'pothole' && this.isGrounded) {
                            this.speed *= 0.40;
                        }
                    }
                });
            }

            verifyCheckpointSecurityMetrics(prevProgress) {
                if (this.lapProgress > 0.23 && this.lapProgress < 0.35) this.hasHitCheckpoint25 = true;
                if (this.lapProgress > 0.48 && this.lapProgress < 0.60 && this.hasHitCheckpoint25) this.hasHitCheckpoint50 = true;
                if (this.lapProgress > 0.73 && this.lapProgress < 0.85 && this.hasHitCheckpoint50) this.hasHitCheckpoint75 = true;

                if (prevProgress > 0.9 && this.lapProgress < 0.1 && this.hasHitCheckpoint75) {
                    this.lapsCompleted += 1;
                    this.hasHitCheckpoint25 = false; 
                    this.hasHitCheckpoint50 = false;
                    this.hasHitCheckpoint75 = false;
                    
                    if (!this.isAI && !raceFinished) {
                        triggerRaceVictoryEvent();
                    }
                }
            }

            calculateLapProgress() {
                let nearestT = 0;
                let minDist = Infinity;
                const scans = 250; 
                for (let i = 0; i <= scans; i++) {
                    const testT = i / scans;
                    const trackPt = trackCurve.getPointAt(testT);
                    const d = this.position.distanceToSquared(trackPt);
                    if (d < minDist) {
                        minDist = d;
                        nearestT = testT;
                    }
                }
                this.lapProgress = nearestT;
            }
        }

        function spawnCustomRaceCars(playerColor) {
            const startPt = trackCurve.getPointAt(0);
            const startTangent = trackCurve.getTangentAt(0);
            const startAngle = Math.atan2(startTangent.x, startTangent.z);

            playerCar = new CustomRaceCar(playerColor, false, playerNameStr);
            playerCar.position.copy(startPt).addScaledVector(startTangent, -10); 
            playerCar.heading = startAngle;

            for (let i = 0; i < 5; i++) {
                const aiData = aiRivals[i];
                const ai = new CustomRaceCar(aiData.color, true, aiData.name);
                const normal = startTangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                ai.position.copy(startPt)
                    .addScaledVector(startTangent, -30 - (i * 15))
                    .addScaledVector(normal, i % 2 === 0 ? 6 : -6);
                ai.heading = startAngle;
                aiCars.push(ai);
            }
        }

        function triggerCountdown() {
            const box = document.getElementById('countdown-box');
            box.style.display = 'block';
            let timerVal = 3;
            
            const interval = setInterval(() => {
                timerVal--;
                if(timerVal === 0) {
                    box.innerText = "GO!";
                    box.style.color = "#64ffda";
                    raceStarted = true;
                } else if (timerVal < 0) {
                    clearInterval(interval);
                    box.style.display = 'none';
                } else {
                    box.innerText = timerVal;
                }
            }, 1000);
        }

        function toggleControls(e, isPressed) {
            switch(e.key) {
                case 'w': case 'W': case 'ArrowUp': activeInputs.Forward = isPressed; break;
                case 's': case 'S': case 'ArrowDown': activeInputs.Backward = isPressed; break;
                case 'a': case 'A': case 'ArrowLeft': activeInputs.Left = isPressed; break;
                case 'd': case 'D': case 'ArrowRight': activeInputs.Right = isPressed; break;
            }
        }

        function runAIAutonomousLogic(car, dt) {
            if (!raceStarted) return; 

            let lookaheadT = car.lapProgress + 0.018; 
            if (lookaheadT > 1.0) lookaheadT -= 1.0;

            const baseTarget = trackCurve.getPointAt(lookaheadT);
            const tangent = trackCurve.getTangentAt(lookaheadT);
            const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
            
            const target = baseTarget.clone().addScaledVector(normal, car.aiOffset);

            const desiredAngle = Math.atan2(target.x - car.position.x, target.z - car.position.z);
            let angularErr = desiredAngle - car.heading;

            while (angularErr < -Math.PI) angularErr += Math.PI * 2;
            while (angularErr > Math.PI) angularErr -= Math.PI * 2;

            let steerVal = 0;
            if (Math.abs(angularErr) > 0.05) steerVal = angularErr > 0 ? 1 : -1;
            
            const curveDampener = Math.abs(angularErr) > 0.3 ? (0.3 + car.aiAggression * 0.4) : 1.0;

            car.updateVehiclePhysics(dt, { gas: curveDampener, brake: 0, steer: steerVal });
        }

        function computeLeaderboardPositions() {
            if(!playerCar) return;
            let pack = [playerCar, ...aiCars];
            
            pack.sort((a, b) => (b.lapsCompleted + b.lapProgress) - (a.lapsCompleted + a.lapProgress));
            
            const rank = pack.findIndex(c => c.label === playerNameStr) + 1;
            const suffix = ["ST", "ND", "RD", "TH", "TH", "TH"][rank - 1];
            const displayRank = rank + suffix;
            
            if(!raceFinished) {
                document.getElementById('place-display').innerText = displayRank;
                finalPlayerRank = displayRank;
            }
            
            return pack; // Return sorted array for the victory screen builder
        }

        function triggerRaceVictoryEvent() {
            raceFinished = true;
            raceStarted = false;
            
            const finalPack = computeLeaderboardPositions();
            
            // Generate Dynamic UI Leaderboard 
            let lbHTML = "";
            finalPack.forEach((car, index) => {
                let suffix = ["ST", "ND", "RD", "TH", "TH", "TH"][index];
                let rankStr = (index + 1) + suffix;
                let colorHex = "#" + car.colorHex.toString(16).padStart(6, '0');
                
                // Highlight Player Row
                let isPlayer = car.label === playerNameStr ? "player-row" : "";
                let progressStr = car.lapsCompleted > 0 ? "FINISHED" : Math.floor(car.lapProgress * 100) + "%";

                lbHTML += `
                <div class="lb-row ${isPlayer}">
                    <div class="lb-rank">${rankStr}</div>
                    <div class="lb-name" style="color: ${colorHex};">${car.label}</div>
                    <div class="lb-score">${progressStr}</div>
                </div>`;
            });

            document.getElementById('final-leaderboard-container').innerHTML = lbHTML;
            document.getElementById('victory-screen').style.display = 'flex';
            document.getElementById('confetti-canvas').style.display = 'block';
            
            initConfettiScript();
        }

        let confettiPieces = [];
        function initConfettiScript() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for(let i=0; i<150; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: `hsl(${Math.random()*360}, 100%, 60%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function drawConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiPieces.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    if (p.y > canvas.height) {
                        confettiPieces[index] = p;
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(drawConfettiFrame);
            }
            drawConfettiFrame();
        }

        function handleWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            const playerCommands = {
                gas: activeInputs.Forward ? 1.0 : 0.0,
                brake: activeInputs.Backward ? 1.0 : 0.0,
                steer: (activeInputs.Left ? 1.0 : 0.0) - (activeInputs.Right ? 1.0 : 0.0)
            };

            if (playerCar) playerCar.updateVehiclePhysics(dt, playerCommands);
            aiCars.forEach(ai => runAIAutonomousLogic(ai, dt));
            
            computeLeaderboardPositions();

            if (playerCar) {
                const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
                const targetCamPos = playerCar.position.clone().add(cameraOffset);
                camera.position.lerp(targetCamPos, 0.12);
                camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

                document.getElementById('speed-out').innerText = Math.floor(playerCar.speed * 2.2); 
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
