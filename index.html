<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Circuit - Pro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; background-color: #050505; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        /* eSports Simulator Menu Redesign */
        #menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: #0b0c10;
            background-image: radial-gradient(#1f2833 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 100; display: flex; align-items: center; justify-content: center; color: white;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        }
        
        .menu-panel {
            background: #0b0c10;
            border: 2px solid #45a29e;
            padding: 50px;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(69, 162, 158, 0.2), inset 0 0 20px rgba(69, 162, 158, 0.1);
            text-align: center;
            max-width: 900px;
        }

        .title-racer { 
            font-family: 'Share Tech Mono', monospace; font-size: 5em; margin: 0; color: #66fcf1; 
            text-transform: uppercase; letter-spacing: 2px; line-height: 1;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
        }
        .subtitle { color: #c5c6c7; margin: 10px 0 40px 0; font-size: 1.3em; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; }
        
        .name-input { 
            background: #1f2833; border: 2px solid #45a29e; color: #66fcf1; border-radius: 2px;
            padding: 15px 20px; font-size: 1.6em; font-family: 'Share Tech Mono', monospace;
            text-align: center; outline: none; width: 70%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
            margin-bottom: 40px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .name-input:focus { background: #0b0c10; box-shadow: 0 0 15px rgba(102, 252, 241, 0.4); }
        .name-input::placeholder { color: #45a29e; opacity: 0.5; }

        .btn-grid { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .car-card {
            background: #1f2833; border: 2px solid #1f2833;
            padding: 12px; border-radius: 2px; cursor: pointer; transition: 0.2s; width: 110px;
        }
        .car-card:hover { transform: translateY(-4px); border-color: #66fcf1; background: #0b0c10; box-shadow: 0 8px 15px rgba(0,0,0,0.6); }
        .color-preview { height: 45px; border-radius: 2px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .car-name { font-size: 1.1em; font-weight: 700; text-transform: uppercase; color: #c5c6c7; line-height: 1.1; }

        #countdown-box { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 12em; font-family: 'Share Tech Mono', monospace; color: #66fcf1; z-index: 50; pointer-events: none; text-shadow: 0 0 40px rgba(102, 252, 241, 0.8); display: none; }
        
        #leaderboard { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(11, 12, 16, 0.9); color: #fff; padding: 15px 30px; border-radius: 2px; border: 1px solid #45a29e; border-top: 4px solid #66fcf1; }
        #place-display { font-size: 4em; font-weight: 700; color: #66fcf1; text-align: center; margin-top: -10px; font-family: 'Share Tech Mono', monospace; }
        
        #dashboard { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(11, 12, 16, 0.9); color: #fff; padding: 15px 30px; border-radius: 2px; border: 1px solid #45a29e; border-top: 4px solid #66fcf1; font-family: 'Share Tech Mono', monospace; pointer-events: none; }
        .stat { font-size: 2em; margin: 0; font-weight: 500; line-height: 1.2; letter-spacing: 1px; color: #c5c6c7; }
        .stat span { color: #66fcf1; font-weight: 700; }

        /* Post-Race Leaderboard */
        #victory-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 5, 0.95); z-index: 90; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(8px); }
        #victory-card { background: #0b0c10; border: 2px solid #45a29e; padding: 40px 60px; border-radius: 4px; text-align: center; box-shadow: 0 0 50px rgba(69, 162, 158, 0.3); min-width: 550px; }
        #victory-card h2 { font-family: 'Share Tech Mono', monospace; font-size: 4em; margin: 0; color: #66fcf1; text-transform: uppercase; text-shadow: 0 0 20px rgba(102, 252, 241, 0.4); }
        #victory-place { font-size: 1.6em; margin: 10px 0 25px 0; color: #c5c6c7; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; }
        
        #final-leaderboard-container { width: 100%; margin-bottom: 30px; }
        .lb-row { display: flex; justify-content: space-between; padding: 12px 20px; background: #1f2833; margin-bottom: 4px; border-radius: 2px; font-size: 1.4em; font-weight: 700; align-items: center; border-left: 4px solid transparent; }
        .lb-row.player-row { background: rgba(69, 162, 158, 0.2); border-left: 4px solid #66fcf1; }
        .lb-rank { width: 40px; color: #c5c6c7; text-align: left; font-family: 'Share Tech Mono', monospace; }
        .lb-name { flex-grow: 1; text-align: left; margin-left: 15px; letter-spacing: 1px; }
        .lb-score { color: #fff; font-family: 'Share Tech Mono', monospace; }

        .restart-btn { font-family: 'Share Tech Mono', monospace; background: #45a29e; color: #0b0c10; border: none; border-radius: 2px; padding: 15px 50px; font-weight: 700; cursor: pointer; font-size: 1.5em; text-transform: uppercase; transition: 0.2s; letter-spacing: 2px; }
        .restart-btn:hover { background: #66fcf1; box-shadow: 0 0 20px rgba(102, 252, 241, 0.5); }
        
        #confetti-canvas { position: absolute; top:0; left:0; width:100vw; height:100vh; z-index: 95; pointer-events: none; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-panel">
            <h1 class="title-racer">MIDNIGHT CIRCUIT</h1>
            <p class="subtitle">Pro Series Simulator</p>
            
            <input type="text" id="racer-name" class="name-input" placeholder="ENTER DRIVER ID" maxlength="14" autocomplete="off">
            
            <div class="btn-grid">
                <div class="car-card" onclick="startRaceSimulation(0xe53e3e)">
                    <div class="color-preview" style="background: #e53e3e; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);"></div>
                    <div class="car-name">Formula Red</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0xffaa00)">
                    <div class="color-preview" style="background: #ffaa00; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);"></div>
                    <div class="car-name">Liquid Gold</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0x0055ff)">
                    <div class="color-preview" style="background: #0055ff; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);"></div>
                    <div class="car-name">Cobalt Blue</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0x00ff66)">
                    <div class="color-preview" style="background: #00ff66; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);"></div>
                    <div class="car-name">Neon Viper</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0xff007f)">
                    <div class="color-preview" style="background: #ff007f; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);"></div>
                    <div class="car-name">Cyber Pink</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0xff5500)">
                    <div class="color-preview" style="background: #ff5500; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);"></div>
                    <div class="car-name">Blaze Orange</div>
                </div>
                <div class="car-card" onclick="startRaceSimulation(0x111111)">
                    <div class="color-preview" style="background: #111111; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); border-color: #333;"></div>
                    <div class="car-name">Stealth Black</div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="victory-screen">
        <div id="victory-card">
            <h2>CONGRATULATIONS!</h2>
            <div id="victory-place">OFFICIAL RACE RESULTS</div>
            <div id="final-leaderboard-container"></div>
            <button class="restart-btn" onclick="window.location.reload()">Return to Garage</button>
        </div>
    </div>

    <div id="countdown-box">3</div>

    <div id="leaderboard">
        <div style="font-size: 1.1em; text-transform: uppercase; font-weight: 700; color: #c5c6c7;">Position</div>
        <div id="place-display">--</div>
    </div>

    <div id="dashboard">
        <div class="stat">SPEED: <span id="speed-out">0</span> MPH</div>
        <div class="stat">LAP: <span id="pos-out">1 / 1</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- MASSIVE COMPLEX TRACK ---
        const trackWaypoints = [
            new THREE.Vector3(0, 0, 0),         // Start / Finish Line
            new THREE.Vector3(0, 0, -300),      // Fast Front Straight
            new THREE.Vector3(150, 0, -450),    // Sweeping Right
            new THREE.Vector3(400, 0, -500),    // Hard Right
            new THREE.Vector3(500, 0, -300),    // Short Straight
            new THREE.Vector3(400, 0, -100),    // Left Hairpin curve
            new THREE.Vector3(200, 0, 0),       // Right Chicane entry
            new THREE.Vector3(100, 0, 150),     // Left Chicane exit
            new THREE.Vector3(300, 0, 350),     // Deep Right Sweeper
            new THREE.Vector3(0, 0, 500),       // Deep Left Sweeper
            new THREE.Vector3(-200, 0, 400),    // Hard Left
            new THREE.Vector3(-300, 0, 200),    // Short Straight Back
            new THREE.Vector3(-100, 0, 100),    // Final Right leading to Grid
            new THREE.Vector3(0, 0, 100)        // Pre-start grid area closure
        ];
        const trackWidth = 36;
        let trackCurve;
        let physicsCurvePoints = []; 

        let scene, camera, renderer, clock;
        let playerCar, aiCars = [];
        let obstacles = [];
        let raceStarted = false;
        let raceFinished = false;
        let finalPlayerRank = "--";
        let playerNameStr = "PLAYER 1";
        
        const activeInputs = { Forward: false, Backward: false, Left: false, Right: false };

        // 7 Unique AI Rivals to fill the 8-car grid
        const aiRivals = [
            { color: 0xffaa00, name: "IGNITE" },
            { color: 0x8e44ad, name: "PHANTOM" },
            { color: 0x00ffff, name: "FROST" },
            { color: 0x99ff00, name: "VENOM" },
            { color: 0xff0055, name: "APEX" },
            { color: 0xff5500, name: "PULSE" },
            { color: 0x222222, name: "SHADOW" }
        ];

        function startRaceSimulation(chosenColor) {
            const inputName = document.getElementById('racer-name').value.trim().toUpperCase();
            if(inputName !== "") playerNameStr = inputName;
            
            document.getElementById('menu-overlay').style.display = 'none';
            init(chosenColor);
            triggerCountdown();
        }

        function init(playerColor) {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.0015); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x223355, 0.9);
            scene.add(ambient);

            trackCurve = new THREE.CatmullRomCurve3(trackWaypoints, true);
            physicsCurvePoints = trackCurve.getPoints(600);

            buildSceneryAndTrack();
            spawnCustomRaceCars(playerColor);

            window.addEventListener('keydown', (e) => toggleControls(e, true));
            window.addEventListener('keyup', (e) => toggleControls(e, false));
            window.addEventListener('resize', handleWindowResize);

            // INSTANT CAMERA LOCK: Ensures player sees car on grid before GO!
            const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
            camera.position.copy(playerCar.position.clone().add(cameraOffset));
            camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

            animate();
        }

        function buildSceneryAndTrack() {
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<800; i++) {
                starCoords.push((Math.random()-0.5)*2000, Math.random()*400+50, (Math.random()-0.5)*2000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.0 })));

            const trackGeo = new THREE.TubeGeometry(trackCurve, 500, trackWidth / 2, 8, true);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x11131a, roughness: 0.9, emissive: 0x020305 });
            const trackMesh = new THREE.Mesh(trackGeo, trackMat);
            trackMesh.scale.set(1, 0.002, 1); 
            scene.add(trackMesh);

            // PERFECTLY CENTERED, HARDCODED CHECKERED FINISH LINE
            const flCanvas = document.createElement('canvas');
            flCanvas.width = 1024;
            flCanvas.height = 256;
            const ctx = flCanvas.getContext('2d');

            for(let i=0; i<32; i++) {
                for(let j=0; j<8; j++) {
                    ctx.fillStyle = (i+j)%2 === 0 ? '#ffffff' : '#050505';
                    ctx.fillRect(i*32, j*32, 32, 32);
                }
            }

            const fadeLeft = ctx.createLinearGradient(0, 0, 250, 0);
            fadeLeft.addColorStop(0, '#11131a');
            fadeLeft.addColorStop(1, 'rgba(17, 19, 26, 0)');
            ctx.fillStyle = fadeLeft;
            ctx.fillRect(0, 0, 250, 256);

            const fadeRight = ctx.createLinearGradient(774, 0, 1024, 0);
            fadeRight.addColorStop(0, 'rgba(17, 19, 26, 0)');
            fadeRight.addColorStop(1, '#11131a');
            ctx.fillStyle = fadeRight;
            ctx.fillRect(774, 0, 250, 256);

            const flTex = new THREE.CanvasTexture(flCanvas);
            const flMat = new THREE.MeshBasicMaterial({ map: flTex, transparent: true });
            
            // Hardcoded perfectly at Z=0 straightaway
            const checkeredMesh = new THREE.Mesh(new THREE.PlaneGeometry(36, 10), flMat);
            checkeredMesh.position.set(0, 0.05, 0); 
            checkeredMesh.rotation.x = -Math.PI / 2;
            scene.add(checkeredMesh);

            const poleGeo = new THREE.CylinderGeometry(0.2, 0.3, 12);
            const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 5);
            armGeo.rotateZ(Math.PI / 2);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x222 });
            const lightGlowMat = new THREE.MeshBasicMaterial({ color: 0x66fcf1 });

            for (let i = 0; i < 50; i++) {
                const t = i / 50;
                const trackPt = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const polePos = trackPt.clone().addScaledVector(normal, (trackWidth / 2) + 4);
                polePos.y = 0;

                const streetLight = new THREE.Group();
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.y = 6;
                const arm = new THREE.Mesh(armGeo, poleMat);
                arm.position.set(-2.5, 12, 0);
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 8), lightGlowMat);
                bulb.position.set(-5, 11.8, 0);

                const spot = new THREE.SpotLight(0xccffff, 12.0, 90, Math.PI / 2.5, 0.5, 0.8);
                spot.position.set(-5, 11.8, 0);
                spot.target.position.copy(trackPt);
                scene.add(spot.target);

                streetLight.add(pole, arm, bulb, spot);
                streetLight.position.copy(polePos);
                streetLight.lookAt(trackPt); 
                scene.add(streetLight);
            }

            buildTrackObstacles();
        }

        function buildTrackObstacles() {
            const placements = [0.15, 0.35, 0.60, 0.85];
            
            placements.forEach((t, index) => {
                const pos = trackCurve.getPointAt(t);
                const tangent = trackCurve.getTangentAt(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const sideShift = (index % 2 === 0) ? -6 : 6;
                pos.addScaledVector(normal, sideShift);
                pos.y = 0;

                if (index % 2 === 0) {
                    const rampGroup = new THREE.Group();
                    const rampGeo = new THREE.BoxGeometry(7, 1.6, 7);
                    const posAttr = rampGeo.attributes.position;
                    for(let i=0; i<posAttr.count; i++) {
                        if(posAttr.getZ(i) > 0) posAttr.setY(i, posAttr.getY(i) - 0.8);
                    }
                    rampGeo.computeVertexNormals();

                    const rampMesh = new THREE.Mesh(rampGeo, new THREE.MeshStandardMaterial({ color: 0x45a29e, emissive: 0x0b1c1c }));
                    rampMesh.position.y = 0.8;
                    rampGroup.add(rampMesh);
                    rampGroup.position.copy(pos);
                    rampGroup.lookAt(pos.clone().sub(tangent));
                    scene.add(rampGroup);
                    obstacles.push({ type: 'ramp', position: pos.clone(), radius: 5.0 });
                } else {
                    const holeGeo = new THREE.CylinderGeometry(4.5, 4.5, 0.1, 16);
                    const holeMesh = new THREE.Mesh(holeGeo, new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true }));
                    holeMesh.position.copy(pos);
                    scene.add(holeMesh);
                    obstacles.push({ type: 'pothole', position: pos.clone(), radius: 5.0 });
                }
            });
        }

        // --- CORE VEHICLE PHYSICS ---
        class CustomRaceCar {
            constructor(colorHex, isAI = false, label = "") {
                this.isAI = isAI;
                this.label = label;
                this.colorHex = colorHex; 
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.heading = 0;
                this.speed = 0;
                this.lapProgress = 0;
                this.lapsCompleted = 0; 

                this.aiOffset = isAI ? (Math.random() - 0.5) * 18 : 0; 
                this.aiAggression = Math.random();

                // Prevent instant win off start block
                this.hasStarted = false;
                this.hasHitCheckpoint25 = false;
                this.hasHitCheckpoint50 = false;
                this.hasHitCheckpoint75 = false;

                this.posY = 0.4;
                this.velY = 0;
                this.isGrounded = true;

                this.acceleration = isAI ? 24.0 : 36.0; 
                this.drag = 0.92;
                this.braking = 45.0;
                this.steeringSensitivity = 3.6; 
                this.maxSpeed = isAI ? 55.0 + (Math.random() * 8) : 65.0; 

                this.mesh = new THREE.Group();
                const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.2 });
                const trimMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.8 });

                const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 5.2), bodyMat);
                body.position.y = 0.25;
                const spoiler = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.15, 0.8), trimMat);
                spoiler.position.set(0, 1.4, -2.4);
                this.mesh.add(body, spoiler);

                const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.7, 12).rotateZ(Math.PI / 2);
                const offsets = [[-1.35, 0.35, 1.7], [1.35, 0.35, 1.7], [-1.35, 0.35, -1.7], [1.35, 0.35, -1.7]];
                offsets.forEach(o => {
                    const w = new THREE.Mesh(wheelGeo, trimMat);
                    w.position.set(o[0], o[1], o[2]);
                    this.mesh.add(w);
                });

                scene.add(this.mesh);
            }

            updateVehiclePhysics(dt, controls) {
                // Physics and steering only process if the race is active
                if (raceStarted && !raceFinished) {
                    if (controls.steer !== 0) {
                        this.heading += controls.steer * this.steeringSensitivity * dt;
                    }

                    if (controls.gas > 0) {
                        this.speed += this.acceleration * controls.gas * dt;
                    } else if (controls.brake > 0) {
                        this.speed -= this.braking * controls.brake * dt;
                    } else {
                        this.speed *= Math.pow(this.drag, dt * 10);
                    }

                    this.speed = THREE.MathUtils.clamp(this.speed, -8.0, this.maxSpeed);
                    this.velocity.set(Math.sin(this.heading) * this.speed, 0, Math.cos(this.heading) * this.speed);
                    const nextPos = this.position.clone().addScaledVector(this.velocity, dt);

                    if (!this.isAI) {
                        if (this.checkCircuitContainment(nextPos)) {
                            this.position.copy(nextPos);
                        } else {
                            this.speed *= -0.5; 
                            this.heading += Math.PI * 0.05 * (controls.steer >= 0 ? -1 : 1); 
                            this.position.addScaledVector(this.velocity, -dt * 0.4);
                        }
                    } else {
                        this.position.copy(nextPos);
                    }
                    
                    let prevProgress = this.lapProgress;
                    this.calculateLapProgress();
                    this.evaluateObstacleIntersections();
                    this.verifyCheckpointSecurityMetrics(prevProgress);
                }

                // Gravity ALWAYS processes, ensuring cars drop onto track immediately on load
                if (!this.isGrounded) {
                    this.velY -= 22.0 * dt; 
                    this.posY += this.velY * dt;
                    if (this.posY <= 0.4) {
                        this.posY = 0.4;
                        this.velY = 0;
                        this.isGrounded = true;
                    }
                }

                // Mesh Sync ALWAYS processes, preventing the ghost-car bug at 0,0,0
                this.mesh.position.copy(this.position);
                this.mesh.position.y = this.posY;
                this.mesh.rotation.y = this.heading;
            }

            checkCircuitContainment(provisionalPos) {
                let shortestDistSq = Infinity;
                for (let i = 0; i < physicsCurvePoints.length; i++) {
                    const distSq = provisionalPos.distanceToSquared(physicsCurvePoints[i]);
                    if (distSq < shortestDistSq) shortestDistSq = distSq;
                }
                return shortestDistSq <= ((trackWidth/2) * (trackWidth/2));
            }

            evaluateObstacleIntersections() {
                obstacles.forEach(obs => {
                    const flatCarPos = new THREE.Vector2(this.position.x, this.position.z);
                    const flatObsPos = new THREE.Vector2(obs.position.x, obs.position.z);
                    
                    if (flatCarPos.distanceTo(flatObsPos) < obs.radius) {
                        if (obs.type === 'ramp' && this.isGrounded) {
                            this.isGrounded = false;
                            this.velY = 13.0; 
                            this.speed += 8.0; 
                        } else if (obs.type === 'pothole' && this.isGrounded) {
                            this.speed *= 0.40;
                        }
                    }
                });
            }

            verifyCheckpointSecurityMetrics(prevProgress) {
                // Prevents instant lap complete trigger off the starting grid line
                if (this.lapProgress > 0.1 && this.lapProgress < 0.2) this.hasStarted = true;

                if (this.hasStarted) {
                    if (this.lapProgress > 0.23 && this.lapProgress < 0.35) this.hasHitCheckpoint25 = true;
                    if (this.lapProgress > 0.48 && this.lapProgress < 0.60 && this.hasHitCheckpoint25) this.hasHitCheckpoint50 = true;
                    if (this.lapProgress > 0.73 && this.lapProgress < 0.85 && this.hasHitCheckpoint50) this.hasHitCheckpoint75 = true;

                    if (prevProgress > 0.9 && this.lapProgress < 0.1 && this.hasHitCheckpoint75) {
                        this.lapsCompleted += 1;
                        this.hasHitCheckpoint25 = false; 
                        this.hasHitCheckpoint50 = false;
                        this.hasHitCheckpoint75 = false;
                        
                        if (!this.isAI && !raceFinished) {
                            triggerRaceVictoryEvent();
                        }
                    }
                }
            }

            calculateLapProgress() {
                let nearestT = 0;
                let minDist = Infinity;
                const scans = 250; 
                for (let i = 0; i <= scans; i++) {
                    const testT = i / scans;
                    const trackPt = trackCurve.getPointAt(testT);
                    const d = this.position.distanceToSquared(trackPt);
                    if (d < minDist) {
                        minDist = d;
                        nearestT = testT;
                    }
                }
                this.lapProgress = nearestT;
            }
        }

        // --- PERFECT 8-CAR STAGGERED STARTING GRID ---
        function spawnCustomRaceCars(playerColor) {
            playerCar = new CustomRaceCar(playerColor, false, playerNameStr);
            playerCar.position.set(-6, 0.4, 20); // Pole Position (Front Left)
            playerCar.heading = Math.PI; // Face directly down -Z straightaway

            const startPositions = [
                {x: 6, z: 20},  // 2nd Place
                {x: -6, z: 40}, // 3rd Place
                {x: 6, z: 40},  // 4th Place
                {x: -6, z: 60}, // 5th Place
                {x: 6, z: 60},  // 6th Place
                {x: -6, z: 80}, // 7th Place
                {x: 6, z: 80}   // 8th Place
            ];

            for (let i = 0; i < 7; i++) {
                const aiData = aiRivals[i];
                const ai = new CustomRaceCar(aiData.color, true, aiData.name);
                ai.position.set(startPositions[i].x, 0.4, startPositions[i].z);
                ai.heading = Math.PI;
                aiCars.push(ai);
            }

            // Sync matrix positions immediately on frame 0 to prevent ghost cars
            playerCar.calculateLapProgress();
            playerCar.mesh.position.copy(playerCar.position);
            playerCar.mesh.rotation.y = playerCar.heading;
            
            aiCars.forEach(ai => {
                ai.calculateLapProgress();
                ai.mesh.position.copy(ai.position);
                ai.mesh.rotation.y = ai.heading;
            });
        }

        function triggerCountdown() {
            const box = document.getElementById('countdown-box');
            box.style.display = 'block';
            let timerVal = 3;
            
            const interval = setInterval(() => {
                timerVal--;
                if(timerVal === 0) {
                    box.innerText = "GO!";
                    box.style.color = "#66fcf1";
                    raceStarted = true;
                } else if (timerVal < 0) {
                    clearInterval(interval);
                    box.style.display = 'none';
                } else {
                    box.innerText = timerVal;
                }
            }, 1000);
        }

        function toggleControls(e, isPressed) {
            switch(e.key) {
                case 'w': case 'W': case 'ArrowUp': activeInputs.Forward = isPressed; break;
                case 's': case 'S': case 'ArrowDown': activeInputs.Backward = isPressed; break;
                case 'a': case 'A': case 'ArrowLeft': activeInputs.Left = isPressed; break;
                case 'd': case 'D': case 'ArrowRight': activeInputs.Right = isPressed; break;
            }
        }

        function runAIAutonomousLogic(car, dt) {
            if (!raceStarted) return; 

            let lookaheadT = car.lapProgress + 0.018; 
            if (lookaheadT > 1.0) lookaheadT -= 1.0;

            const baseTarget = trackCurve.getPointAt(lookaheadT);
            const tangent = trackCurve.getTangentAt(lookaheadT);
            const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
            
            const target = baseTarget.clone().addScaledVector(normal, car.aiOffset);

            const desiredAngle = Math.atan2(target.x - car.position.x, target.z - car.position.z);
            let angularErr = desiredAngle - car.heading;

            while (angularErr < -Math.PI) angularErr += Math.PI * 2;
            while (angularErr > Math.PI) angularErr -= Math.PI * 2;

            let steerVal = 0;
            if (Math.abs(angularErr) > 0.05) steerVal = angularErr > 0 ? 1 : -1;
            
            const curveDampener = Math.abs(angularErr) > 0.3 ? (0.3 + car.aiAggression * 0.4) : 1.0;

            car.updateVehiclePhysics(dt, { gas: curveDampener, brake: 0, steer: steerVal });
        }

        function computeLeaderboardPositions() {
            if(!playerCar) return;
            let pack = [playerCar, ...aiCars];
            
            pack.sort((a, b) => (b.lapsCompleted + b.lapProgress) - (a.lapsCompleted + a.lapProgress));
            
            const rank = pack.findIndex(c => c.label === playerNameStr) + 1;
            const suffix = ["ST", "ND", "RD", "TH", "TH", "TH", "TH", "TH"][rank - 1];
            const displayRank = rank + suffix;
            
            if(!raceFinished) {
                document.getElementById('place-display').innerText = displayRank;
                finalPlayerRank = displayRank;
            }
            
            return pack; 
        }

        function triggerRaceVictoryEvent() {
            raceFinished = true;
            raceStarted = false;
            
            const finalPack = computeLeaderboardPositions();
            
            let lbHTML = "";
            finalPack.forEach((car, index) => {
                let suffix = ["ST", "ND", "RD", "TH", "TH", "TH", "TH", "TH"][index];
                let rankStr = (index + 1) + suffix;
                let colorHex = "#" + car.colorHex.toString(16).padStart(6, '0');
                
                let isPlayer = car.label === playerNameStr ? "player-row" : "";
                let progressStr = car.lapsCompleted > 0 ? "FINISHED" : Math.floor(car.lapProgress * 100) + "%";

                lbHTML += `
                <div class="lb-row ${isPlayer}">
                    <div class="lb-rank">${rankStr}</div>
                    <div class="lb-name" style="color: ${colorHex};">${car.label}</div>
                    <div class="lb-score">${progressStr}</div>
                </div>`;
            });

            document.getElementById('final-leaderboard-container').innerHTML = lbHTML;
            document.getElementById('victory-screen').style.display = 'flex';
            document.getElementById('confetti-canvas').style.display = 'block';
            
            initConfettiScript();
        }

        let confettiPieces = [];
        function initConfettiScript() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for(let i=0; i<150; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: `hsl(${Math.random()*360}, 100%, 60%)`,
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function drawConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiPieces.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    if (p.y > canvas.height) {
                        confettiPieces[index] = p;
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(drawConfettiFrame);
            }
            drawConfettiFrame();
        }

        function handleWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            const playerCommands = {
                gas: activeInputs.Forward ? 1.0 : 0.0,
                brake: activeInputs.Backward ? 1.0 : 0.0,
                steer: (activeInputs.Left ? 1.0 : 0.0) - (activeInputs.Right ? 1.0 : 0.0)
            };

            if (playerCar) playerCar.updateVehiclePhysics(dt, playerCommands);
            aiCars.forEach(ai => runAIAutonomousLogic(ai, dt));
            
            computeLeaderboardPositions();

            if (playerCar) {
                const cameraOffset = new THREE.Vector3(-Math.sin(playerCar.heading) * 16, 6.2, -Math.cos(playerCar.heading) * 16);
                const targetCamPos = playerCar.position.clone().add(cameraOffset);
                camera.position.lerp(targetCamPos, 0.12);
                camera.lookAt(playerCar.position.clone().add(new THREE.Vector3(0, 0.8, 3)));

                document.getElementById('speed-out').innerText = Math.floor(playerCar.speed * 2.2); 
            }

            renderer.render(scene, camera);
        }
    </script>
